<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NEON FIST — 2D Fighting</title>
<style>
  :root { --bg:#05060d; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { width:100%; height:100%; background:var(--bg); overflow:hidden;
    font-family:"Segoe UI", "Hiragino Sans", "Noto Sans JP", system-ui, sans-serif; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(circle at 50% 30%, #14182c 0%, #05060d 70%); }
  canvas { display:block; image-rendering:auto;
    box-shadow:0 0 60px rgba(80,120,255,.25), 0 0 0 2px rgba(120,160,255,.15);
    border-radius:6px; background:#000; }
  #hint { position:fixed; bottom:8px; left:0; right:0; text-align:center; color:#7e87b5;
    font-size:12px; letter-spacing:.5px; pointer-events:none; user-select:none; }
  /* ---- オンライン対戦ロビー（DOMオーバーレイ） ---- */
  .overlay { position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    background:rgba(4,6,13,.78); z-index:20; }
  .overlay.hidden { display:none; }
  .panel { background:linear-gradient(160deg,#161a2e,#0c0e1c); border:1px solid rgba(120,160,255,.28);
    border-radius:14px; padding:30px 34px; width:min(440px,90vw); text-align:center;
    box-shadow:0 12px 50px rgba(0,0,0,.6), 0 0 0 1px rgba(120,160,255,.08);
    color:#dfe6ff; font-family:inherit; }
  .panel h2 { font-size:24px; margin-bottom:18px; letter-spacing:1px;
    background:linear-gradient(90deg,#9fe8ff,#5aa6ff,#ff5bd0); -webkit-background-clip:text;
    background-clip:text; color:transparent; }
  .panel .row { display:flex; gap:8px; margin:12px 0; }
  .panel button { width:100%; padding:13px 16px; margin:7px 0; border:none; border-radius:9px;
    font-size:16px; font-weight:700; cursor:pointer; color:#06101f;
    background:linear-gradient(180deg,#7fd0ff,#3da6ff); transition:transform .06s, filter .12s; }
  .panel button:hover { filter:brightness(1.1); }
  .panel button:active { transform:translateY(1px); }
  .panel button.ghost { background:transparent; color:#9fb4e0; border:1px solid rgba(120,160,255,.3); }
  .panel button:disabled { opacity:.45; cursor:default; filter:none; }
  .panel input { flex:1; padding:12px 14px; border-radius:9px; border:1px solid rgba(120,160,255,.35);
    background:#0a0d1a; color:#fff; font-size:20px; font-weight:700; letter-spacing:4px;
    text-align:center; text-transform:uppercase; outline:none; }
  .panel input::placeholder { color:#566; letter-spacing:1px; font-weight:400; }
  #statusText { font-size:15px; color:#bcd6ff; margin:6px 0 14px; min-height:20px; }
  #roomCode { font-size:40px; font-weight:900; letter-spacing:10px; margin:8px 0 18px;
    color:#ffd23d; text-shadow:0 0 18px rgba(255,210,61,.5); }
  #roomCode.hidden, #btnStart.hidden, #lobbyHome.hidden, #lobbyStatus.hidden,
  #btnRematch.hidden { display:none; }
  .hint-sm { font-size:12px; color:#7e87b5; margin-top:10px; }
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="1280" height="720"></canvas></div>
<div id="hint">移動: ←→ または A/D ｜ 攻撃: F / Space（CPU戦は文字キー連打）｜ Enter 決定/リスタート</div>

<!-- オンライン対戦ロビー -->
<div id="lobby" class="overlay hidden">
  <div class="panel">
    <h2>オンライン対戦</h2>
    <div id="lobbyHome">
      <button id="btnHost">部屋を作る（ホスト）</button>
      <div class="row">
        <input id="codeInput" maxlength="4" placeholder="部屋コード" />
        <button id="btnJoin" style="width:auto;padding-left:22px;padding-right:22px;">参加</button>
      </div>
      <button id="btnBack" class="ghost">戻る</button>
      <div class="hint-sm">同じ部屋コードを相手に伝えて接続します</div>
    </div>
    <div id="lobbyStatus" class="hidden">
      <div id="statusText">…</div>
      <div id="roomCode" class="hidden"></div>
      <button id="btnStart" class="hidden">対戦開始</button>
      <button id="btnCancel" class="ghost">キャンセル</button>
    </div>
  </div>
</div>

<!-- 試合終了（オンライン） -->
<div id="rematch" class="overlay hidden">
  <div class="panel">
    <h2 id="rematchText">試合終了</h2>
    <button id="btnRematch" class="hidden">もう一度たたかう</button>
    <button id="btnExit" class="ghost">退出する</button>
  </div>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
"use strict";
/* =====================================================================
   NEON FIST — 対CPU 2D格闘ゲーム  (single-file, no assets)
   描画: Canvas2D 関節アニメ / 音: Web Audio 合成
   ===================================================================== */

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const W = canvas.width, H = canvas.height;
const GROUND_Y = H - 96;          // 地面の高さ(キャラの足元)
const FLOOR_MIN = 70, FLOOR_MAX = W - 70;

/* ----- 画面フィット（アスペクト維持） ----- */
function fit() {
  const s = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width = (W * s) + "px";
  canvas.style.height = (H * s) + "px";
}
window.addEventListener("resize", fit); fit();

/* =====================================================================
   AUDIO ENGINE  — Web Audio 合成
   ===================================================================== */
const Audio_ = (() => {
  let ac = null, master = null, noiseBuf = null, bgmTimer = null, bgmStep = 0, musicGain = null, punchBus = null;
  function ensure() {
    if (ac) return;
    ac = new (window.AudioContext || window.webkitAudioContext)();
    master = ac.createGain(); master.gain.value = 0.95;
    // 打撃の派手な瞬間音を潰さずに音量を稼ぐためのコンプ／リミッタ
    const comp = ac.createDynamicsCompressor();
    comp.threshold.value = -10; comp.knee.value = 20; comp.ratio.value = 12;
    comp.attack.value = 0.002; comp.release.value = 0.15;
    master.connect(comp); comp.connect(ac.destination);
    musicGain = ac.createGain(); musicGain.gain.value = 0.16; musicGain.connect(master);
    // 打撃に余韻と広がりを与える空間リバーブ（合成インパルス）
    const conv = ac.createConvolver();
    const rlen = Math.floor(ac.sampleRate * 0.5);
    const imp = ac.createBuffer(2, rlen, ac.sampleRate);
    for (let ch = 0; ch < 2; ch++) {
      const id = imp.getChannelData(ch);
      for (let i = 0; i < rlen; i++) id[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / rlen, 3.0);
    }
    conv.buffer = imp;
    const revGain = ac.createGain(); revGain.gain.value = 0.5; revGain.connect(master);
    conv.connect(revGain);
    // 打撃専用バス：ドライ音はmasterへ、一部をリバーブへ送って「デカく」する
    punchBus = ac.createGain(); punchBus.gain.value = 1.0;
    punchBus.connect(master); punchBus.connect(conv);
    // ノイズバッファ
    const len = ac.sampleRate * 1.0;
    noiseBuf = ac.createBuffer(1, len, ac.sampleRate);
    const d = noiseBuf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  }
  function resume() { ensure(); if (ac.state === "suspended") ac.resume(); }
  function now() { return ac.currentTime; }

  function noise(dur, vol, lpStart, lpEnd, dest) {
    const src = ac.createBufferSource(); src.buffer = noiseBuf;
    const g = ac.createGain(); const lp = ac.createBiquadFilter();
    lp.type = "lowpass";
    lp.frequency.setValueAtTime(lpStart, now());
    lp.frequency.exponentialRampToValueAtTime(Math.max(60, lpEnd), now() + dur);
    g.gain.setValueAtTime(vol, now());
    g.gain.exponentialRampToValueAtTime(0.0008, now() + dur);
    src.connect(lp); lp.connect(g); g.connect(dest || master);
    src.start(); src.stop(now() + dur + 0.02);
  }
  function tone(type, f0, f1, dur, vol, dest) {
    const o = ac.createOscillator(); const g = ac.createGain();
    o.type = type; o.frequency.setValueAtTime(f0, now());
    if (f1 && f1 !== f0) o.frequency.exponentialRampToValueAtTime(Math.max(20, f1), now() + dur);
    g.gain.setValueAtTime(0.0001, now());
    g.gain.exponentialRampToValueAtTime(vol, now() + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0008, now() + dur);
    o.connect(g); g.connect(dest || master);
    o.start(); o.stop(now() + dur + 0.02);
  }
  // 歪み(ディストーション)カーブ — ザクッ／バリッとした質感用
  function distCurve(k) {
    const n = 256, c = new Float32Array(n);
    for (let i = 0; i < n; i++) { const x = i / (n - 1) * 2 - 1; c[i] = (1 + k) * x / (1 + k * Math.abs(x)); }
    return c;
  }
  // 歪ませた砕けるノイズ一発（ザク／パン）
  function crunch(dur, vol, lpStart, lpEnd, drive, dest) {
    const src = ac.createBufferSource(); src.buffer = noiseBuf;
    const ws = ac.createWaveShaper(); ws.curve = distCurve(drive); ws.oversample = "2x";
    const lp = ac.createBiquadFilter(); lp.type = "lowpass";
    lp.frequency.setValueAtTime(lpStart, now());
    lp.frequency.exponentialRampToValueAtTime(Math.max(60, lpEnd), now() + dur);
    const g = ac.createGain();
    g.gain.setValueAtTime(vol, now());
    g.gain.exponentialRampToValueAtTime(0.0008, now() + dur);
    src.connect(ws); ws.connect(lp); lp.connect(g); g.connect(dest || master);
    src.start(); src.stop(now() + dur + 0.02);
  }
  // 明るく抜ける高音の一発（パシッ／スパッ）— ハイパスでこもりを取る
  function crack(dur, vol, hpStart, hpEnd, dest) {
    const src = ac.createBufferSource(); src.buffer = noiseBuf;
    const hp = ac.createBiquadFilter(); hp.type = "highpass";
    hp.frequency.setValueAtTime(hpStart, now());
    hp.frequency.exponentialRampToValueAtTime(Math.max(200, hpEnd), now() + dur);
    const g = ac.createGain();
    g.gain.setValueAtTime(vol, now());
    g.gain.exponentialRampToValueAtTime(0.0006, now() + dur);
    src.connect(hp); hp.connect(g); g.connect(dest || master);
    src.start(); src.stop(now() + dur + 0.02);
  }
  // 腹に来る低音ボディ（ダン／バン）— 急降下するキック的アタック
  function thump(f0, f1, dur, vol, dest) {
    const o = ac.createOscillator(); const g = ac.createGain();
    o.type = "sine"; o.frequency.setValueAtTime(f0, now());
    o.frequency.exponentialRampToValueAtTime(Math.max(20, f1), now() + dur * 0.6);
    g.gain.setValueAtTime(vol, now());
    g.gain.exponentialRampToValueAtTime(0.0008, now() + dur);
    o.connect(g); g.connect(dest || master);
    o.start(); o.stop(now() + dur + 0.02);
  }

  const api = {
    resume,
    whiff(strength, pose) {
      ensure();
      const s = strength; pose = pose || "punch";
      if (pose === "spin") {
        // ブォン…と回るような風切り
        tone("sine", 240, 90, 0.24, 0.14);
        crack(0.18, 0.2, 800, 2800);
      } else if (pose === "kick" || pose === "jumpkick") {
        // ヒュッ（重め・大振り）
        crack(0.17, 0.22 + 0.05 * s, 1000, 3800);
        tone("sine", 320, 110, 0.16, 0.1);
      } else {
        // シュッ（鋭い）
        crack(0.11 + 0.03 * s, 0.18 + 0.05 * s, 1400, 4400 + 800 * s);
      }
    },
    hit(strength, pose) {
      ensure();
      const s = strength; pose = pose || "punch"; // 0=軽い / 1=重い
      // === 共通：当たりの芯＋サブブームで“大袈裟”な土台 ===
      thump(215 + 50 * s, 50, 0.22 + 0.08 * s, 0.82 + 0.18 * s);   // ドスッ（強化）
      thump(68, 32, 0.42 + 0.1 * s, 0.5 + 0.12 * s);               // ドゥーン（サブブーム）
      crunch(0.1 + 0.04 * s, 0.6 + 0.2 * s, 2600 + 300 * s, 600, 14 + 9 * s); // バキッ
      tone("triangle", 2500, 1500, 0.14 + 0.04 * s, 0.1 + 0.03 * s);          // キィン（抜ける高音シマー）
      // === 技ごとの味付け ===
      if (pose === "punch") {
        // バキィン：金属的な鋭いリングで派手に
        tone("square", 360 + 80 * s, 90, 0.08, 0.34);
        tone("triangle", 1500 + 200 * s, 720, 0.2 + 0.05 * s, 0.18);   // キラッと余韻
        crack(0.03, 0.12 + 0.12 * s, 3600, 1800);
      } else if (pose === "kick" || pose === "jumpkick") {
        // ドガァン：重い低音＋落ちるスイープ
        tone("sawtooth", 260, 60, 0.24 + 0.06 * s, 0.32);
        thump(120, 38, 0.32, 0.42);
        crack(0.04, 0.14 + 0.12 * s, 3000, 1500);
      } else if (pose === "spin") {
        // ガガガッ→ドバァン：連続衝撃で乱舞感
        tone("sawtooth", 520, 130, 0.32, 0.22);                       // 唸る回転音
        setTimeout(() => { if (ac) crunch(0.05, 0.45, 2200, 700, 18); }, 45);
        setTimeout(() => { if (ac) { crunch(0.08, 0.55, 2400, 600, 18); thump(150, 44, 0.28, 0.55); } }, 95);
      } else {
        // push 等：唸る一撃
        tone("sawtooth", 180, 540, 0.24, 0.3);
      }
      // 重い一撃：全体にさらに追い打ち “ドガッ”
      if (s) { thump(112, 40, 0.32, 0.52); crunch(0.08, 0.42, 1500, 480, 18); }
    },
    block() { ensure(); noise(0.09, 0.4, 6000, 2500); tone("triangle", 700, 400, 0.08, 0.15); },
    special() {
      ensure();
      tone("sawtooth", 180, 520, 0.22, 0.25);
      noise(0.2, 0.35, 4000, 600);
      tone("square", 90, 70, 0.3, 0.25);
    },
    charge() { ensure(); tone("sawtooth", 80, 240, 0.5, 0.16); },
    ultimate() {
      ensure();
      tone("sawtooth", 120, 900, 0.5, 0.3);
      tone("square", 240, 1800, 0.5, 0.18);
      noise(0.5, 0.45, 5000, 400);
      setTimeout(() => { tone("sawtooth", 700, 90, 0.4, 0.3); }, 120);
    },
    fire() { ensure(); tone("sine", 600, 160, 0.3, 0.22); noise(0.18, 0.2, 2200, 400); },
    ko() {
      ensure();
      tone("sawtooth", 400, 60, 0.7, 0.35);
      noise(0.6, 0.4, 3000, 200);
      setTimeout(() => tone("square", 300, 50, 0.5, 0.25), 100);
    },
    round() { ensure(); tone("square", 520, 520, 0.12, 0.2); setTimeout(() => tone("square", 780, 780, 0.18, 0.22), 130); },
    startBGM() {
      ensure(); if (bgmTimer) return;
      const root = 55; // A1
      const bass = [0, 0, 7, 5, 0, 0, 10, 7];
      const arp = [0, 7, 12, 7, 3, 10, 15, 10];
      const stepDur = 0.18;
      bgmStep = 0;
      bgmTimer = setInterval(() => {
        if (!ac) return;
        const i = bgmStep % 8;
        const bf = root * Math.pow(2, bass[i] / 12);
        tone("triangle", bf, bf, stepDur * 0.9, 0.5, musicGain);
        if (bgmStep % 2 === 0) {
          const af = root * 4 * Math.pow(2, arp[i] / 12);
          tone("square", af, af, stepDur * 0.7, 0.18, musicGain);
        }
        if (i % 4 === 0) noise(0.05, 0.3, 8000, 4000, musicGain); // hat
        bgmStep++;
      }, stepDur * 1000);
    },
    stopBGM() { if (bgmTimer) { clearInterval(bgmTimer); bgmTimer = null; } }
  };
  return api;
})();

/* =====================================================================
   INPUT — 連打で通常技。CPU戦/2人対戦でキー配置を切替
     CPU戦  : 1P=矢印で移動 / どの文字キーでも攻撃（従来どおり）
     2人対戦: 1P=A/D移動・F(or Space)攻撃 ／ 2P=←→移動・／(or 右Shift)攻撃
   ===================================================================== */
const Input = (() => {
  const keys = {};                 // 押下状態（e.code をキーに）
  const q1 = [], q2 = [];          // 各プレイヤーの攻撃イベント
  let enterPressed = false;
  let menuNav = 0, digitPick = -1; // タイトルのメニュー操作
  let onlineAttack = false;        // オンライン：このフレームに攻撃入力があったか
  let mode = "cpu";
  function setMode(m) { mode = m; }
  // フォーカスがテキスト入力（ロビーの部屋コード欄）にある時はゲーム操作を無効化
  function typingInField() {
    const el = document.activeElement;
    return el && (el.tagName === "INPUT" || el.tagName === "TEXTAREA");
  }

  window.addEventListener("keydown", (e) => {
    if (typingInField()) return;     // コード入力中はキーを奪わない
    Audio_.resume();
    const code = e.code, key = e.key;
    if (key === "Enter") { enterPressed = true; e.preventDefault(); return; }
    // タイトル用：上下でメニュー移動、数字で直接選択
    if (code === "ArrowUp" || code === "ArrowDown") { menuNav = code === "ArrowUp" ? -1 : 1; e.preventDefault(); return; }
    if (key === "1") { digitPick = 0; e.preventDefault(); return; }
    if (key === "2") { digitPick = 1; e.preventDefault(); return; }

    if (mode === "online") {
      // 移動：←→ / A D どちらでもOK（ローカルは1人なので寛容に）
      if (code === "ArrowLeft" || code === "ArrowRight" || code === "KeyA" || code === "KeyD") {
        keys[code] = true; e.preventDefault(); return;
      }
      if (e.repeat) return;
      if (code === "KeyF" || code === "KeyG" || code === "KeyV" || code === "KeyJ" || code === "Space" || code === "Slash") {
        e.preventDefault(); onlineAttack = true; return;
      }
      return;
    }

    // 矢印（左右）は常に押下状態として保持（CPU戦の1P / 対戦の2P 移動）
    if (code === "ArrowLeft" || code === "ArrowRight") { keys[code] = true; e.preventDefault(); return; }
    if (mode === "vs") {
      if (code === "KeyA" || code === "KeyD") { keys[code] = true; e.preventDefault(); return; }
      if (e.repeat) return;
      if (code === "KeyF" || code === "KeyG" || code === "KeyV" || code === "Space") { e.preventDefault(); q1.push({ kind: "normal" }); return; }
      if (code === "Slash" || code === "Period" || code === "ShiftRight") { e.preventDefault(); q2.push({ kind: "normal" }); return; }
    } else {
      if (e.repeat) return;
      if (/^[a-zA-Z]$/.test(key)) { e.preventDefault(); q1.push({ kind: "normal" }); return; }
    }
  });
  window.addEventListener("keyup", (e) => {
    const code = e.code;
    if (code === "ArrowLeft" || code === "ArrowRight" || code === "KeyA" || code === "KeyD") keys[code] = false;
  });
  window.addEventListener("blur", () => { for (const k in keys) keys[k] = false; });

  function update() {}
  // 1P の移動：対戦ではA/D、CPU戦では矢印
  function moveDir1() {
    if (mode === "vs") return (keys["KeyD"] ? 1 : 0) - (keys["KeyA"] ? 1 : 0);
    return (keys["ArrowRight"] ? 1 : 0) - (keys["ArrowLeft"] ? 1 : 0);
  }
  // 2P の移動（対戦のみ）：矢印
  function moveDir2() { return (keys["ArrowRight"] ? 1 : 0) - (keys["ArrowLeft"] ? 1 : 0); }
  function takeEvents1() { const q = q1.slice(); q1.length = 0; return q; }
  function takeEvents2() { const q = q2.slice(); q2.length = 0; return q; }
  function consumeEnter() { const v = enterPressed; enterPressed = false; return v; }
  function consumeNav() { const v = menuNav; menuNav = 0; return v; }
  function consumeDigit() { const v = digitPick; digitPick = -1; return v; }
  function anyKeyCharging() { return false; }
  // オンライン：このフレームのローカル入力を1サンプル取り出す（攻撃エッジは消費）
  function sampleLocal() {
    const move = ((keys["ArrowRight"] || keys["KeyD"]) ? 1 : 0) - ((keys["ArrowLeft"] || keys["KeyA"]) ? 1 : 0);
    const attack = onlineAttack; onlineAttack = false;
    return { move, attack };
  }
  return { update, setMode, moveDir1, moveDir2, takeEvents1, takeEvents2,
           consumeEnter, consumeNav, consumeDigit, anyKeyCharging, sampleLocal };
})();

/* =====================================================================
   MOVE DATA — 5種通常技 / 特別技 / 必殺技
   ===================================================================== */
// アルファベットを押すたびに、この5種を順番にループする
const NORMALS = [
  { name: "弱パンチ",           pose: "punch",    arm: "front", dur: .18, hs: .03, he: .10, dmg: 6,  reach: 96,  kb: 130, up: 0,   meter: 6 },
  { name: "強パンチ",           pose: "punch",    arm: "back",  dur: .30, hs: .08, he: .17, dmg: 11, reach: 110, kb: 240, up: 0,   meter: 9 },
  { name: "ジャンプキック",     pose: "jumpkick", arm: "front", dur: .40, hs: .12, he: .26, dmg: 13, reach: 122, kb: 250, up: -80, meter: 11, hop: 130 },
  { name: "ダイナミックキック", pose: "kick",     arm: "back",  dur: .40, hs: .12, he: .24, dmg: 15, reach: 134, kb: 300, up: -60, meter: 12 },
  { name: "大車輪パンチ",       pose: "spin",     arm: "front", dur: .42, hs: .14, he: .29, dmg: 14, reach: 114, kb: 300, up: 0,   meter: 12 },
];
// 同じ位置の強化版（2回押し=特別技 / ゲージ不足の必殺技代替）
const SPECIALS = [
  { name: "連打突き",       pose: "punch",    arm: "front", dur: .38, hs: .08, he: .24, dmg: 16, reach: 132, kb: 320, up: 0,    meter: 14, lunge: 240 },
  { name: "豪打",           pose: "punch",    arm: "back",  dur: .44, hs: .12, he: .26, dmg: 20, reach: 144, kb: 430, up: -60,  meter: 16, lunge: 200 },
  { name: "流星脚",         pose: "jumpkick", arm: "front", dur: .48, hs: .13, he: .32, dmg: 19, reach: 152, kb: 380, up: -240, meter: 15, lunge: 220, hop: 180 },
  { name: "竜巻脚",         pose: "kick",     arm: "back",  dur: .46, hs: .11, he: .32, dmg: 20, reach: 156, kb: 380, up: -160, meter: 15, lunge: 230 },
  { name: "大車輪・乱舞",   pose: "spin",     arm: "front", dur: .50, hs: .15, he: .36, dmg: 18, reach: 132, kb: 360, up: 0,    meter: 16, lunge: 180 },
];
const ULTIMATE = { name: "波動・烈", pose: "push", dur: .52, hs: .18, he: .28, projectile: true, dmg: 26, cost: 50 };
const MAX_METER = 100;

/* =====================================================================
   POSE — 関節アニメ用のポーズ定義（角度: 0=真下, +で前方向）
   ===================================================================== */
function basePose() {
  return {
    hipH: 96, lean: 0.06, crouch: 0,
    bSh: 1.15, bEl: 2.25,   // 奥腕(上腕,前腕)
    fSh: 1.05, fEl: 2.05,   // 手前腕
    bHip: -0.32, bKnee: -0.12,
    fHip: 0.40, fKnee: 0.18,
  };
}
function lerp(a, b, t) { return a + (b - a) * t; }
function blendPose(p, t, tgt) {
  const o = {};
  for (const k in p) o[k] = (k in tgt) ? lerp(p[k], tgt[k], t) : p[k];
  return o;
}
// 完全なポーズを作る / 2ポーズ間を補間
function fullPose(ov) { return Object.assign(basePose(), ov); }
function mixPose(a, b, t) {
  const o = {};
  for (const k in a) { const bv = (b[k] !== undefined) ? b[k] : a[k]; o[k] = a[k] + (bv - a[k]) * t; }
  return o;
}
// 各技の「タメ(windup)」と「振り抜き(strike)」キーフレーム（大袈裟に）
function moveKeyframes(move) {
  const front = move.arm !== "back";
  if (move.pose === "punch") {
    return front ? {
      windup: { fSh: 0.30, fEl: 0.05, bSh: 1.25, bEl: 1.75, lean: -0.34, hipH: 86, bHip: -0.45, fHip: 0.55 },
      strike: { fSh: 1.62, fEl: 1.60, bSh: 0.10, bEl: 0.05, lean: 0.66, hipH: 98, bHip: -0.6, fHip: 0.78, fKnee: 0.5 },
    } : {
      windup: { bSh: 0.15, bEl: -0.15, fSh: 1.25, fEl: 1.75, lean: -0.48, hipH: 84, bHip: -0.55 },
      strike: { bSh: 1.62, bEl: 1.62, fSh: 0.08, fEl: 0.0, lean: 0.74, hipH: 98, bHip: -0.65, fHip: 0.82, fKnee: 0.45 },
    };
  }
  if (move.pose === "kick") {
    return front ? { // 前蹴り：膝を抱えて一気に突き出す
      windup: { fHip: 0.75, fKnee: -1.05, lean: -0.28, bKnee: -0.1, fSh: 0.5, bSh: 0.75, hipH: 92 },
      strike: { fHip: 1.55, fKnee: 1.62, lean: -0.55, bKnee: -0.05, fSh: -0.25, bSh: 0.35, hipH: 86 },
    } : { // ハイキック：大きく振り回す
      windup: { bHip: -0.75, bKnee: -1.05, lean: -0.32, fKnee: 0.2, fSh: 0.6, bSh: 0.6, hipH: 84 },
      strike: { bHip: 1.72, bKnee: 1.55, lean: -0.72, fKnee: 0.55, fSh: -0.35, bSh: 0.3, hipH: 82 },
    };
  }
  if (move.pose === "jumpkick") { // 跳び蹴り：両脚を畳んで跳び、前脚を突き出す
    return {
      windup: { fHip: 0.55, fKnee: -1.1, bHip: -0.4, bKnee: -1.1, lean: 0.05, fSh: 0.55, bSh: 0.6, fEl: 1.8, bEl: 1.8, hipH: 98 },
      strike: { fHip: 1.45, fKnee: 1.6, bHip: -0.15, bKnee: -0.9, lean: -0.08, fSh: -0.25, bSh: 0.6, fEl: 1.4, hipH: 98 },
    };
  }
  if (move.pose === "spin") { // 頭上に振りかぶって全力で叩きつける（かかと落とし的な振り下ろし）
    return {
      // タメ：両腕を真上に高く振りかぶり、のけぞって伸び上がる（つま先立ち）
      windup: { fSh: 3.05, fEl: 3.18, bSh: 2.98, bEl: 3.18, lean: -0.6, hipH: 108, fHip: 0.3, bHip: -0.5, fKnee: -0.15, bKnee: -0.1 },
      // 叩きつけ：腕を真下〜前方へ振り下ろし、深く沈み込んで体重を乗せる
      strike: { fSh: 0.55, fEl: 0.30, bSh: 0.5, bEl: 0.30, lean: 0.92, hipH: 74, fHip: 0.9, bHip: -0.35, fKnee: 0.8, bKnee: 0.5 },
    };
  }
  if (move.pose === "upper") { // 昇龍：深くしゃがんで爆発的に立ち上がる
    return {
      windup: { fSh: 0.25, fEl: 0.15, bSh: 0.9, bEl: 1.6, lean: 0.08, hipH: 64, bHip: 0.35, fHip: 0.6, bKnee: 0.65, fKnee: 0.65 },
      strike: { fSh: 2.72, fEl: 3.05, bSh: 1.25, bEl: 1.95, lean: 0.16, hipH: 122, bHip: -0.2, fHip: 0.22, bKnee: 0.0, fKnee: 0.0 },
    };
  }
  // push (ultimate)：両手を引き絞って前へ突き出す
  return {
    windup: { fSh: 0.4, fEl: 0.2, bSh: 0.4, bEl: 0.2, lean: -0.38, hipH: 80, bHip: -0.5, fHip: 0.62 },
    strike: { fSh: 1.5, fEl: 1.5, bSh: 1.5, bEl: 1.5, lean: 0.52, hipH: 100, bHip: -0.55, fHip: 0.72 },
  };
}

/* =====================================================================
   FIGHTER
   ===================================================================== */
class Fighter {
  constructor(opts) {
    this.name = opts.name;
    this.isCPU = !!opts.isCPU;
    this.colors = opts.colors;
    // 体格・髪型などの差別化設定（骨格長は変えず見た目だけ変える＝挙動は不変）
    this.build = Object.assign({ limbW: 1, torsoW: 1, headR: 15, hair: "spike", beard: false }, opts.build || {});
    this.startX = opts.x;
    this.comboIndex = 0;   // 攻撃ループ位置：被弾やラウンド交代では保持し、試合開始でのみ0に戻す
    this.reset(opts.facing);
  }
  reset(facing) {
    this.x = this.startX; this.y = GROUND_Y;
    this.vx = 0; this.facing = facing;
    this.hp = 100; this.maxHp = 100;
    this.meter = 0;
    this.state = "idle";            // idle/walk/attack/hit/block/ko
    this.attack = null;             // {move,kind,t}
    this.hasHit = false;
    this.hitstun = 0; this.blockstun = 0;
    this.flash = 0; this.koTimer = 0;
    this.airY = 0; this.airVY = 0;  // 打ち上げ用の縦オフセット
    this.tumble = 0; this.tumbleV = 0; this.tumbleTarget = 0; // 吹っ飛び回転
    this.prone = false; this.bounced = false; this.downTimer = 0; // ダウン
    this.blocking = false; this.cmdDir = 0;
    this.trail = [];
    this.buffer = null; this.bufferT = 0;
    this.walkPhase = 0; this.clock = Math.random() * 10;
    this.hairSway = 0; this.hairSwayV = 0;   // 髪・帯のなびき（バネ）
  }
  get airborne() { return this.airY < -1; }
  canAct() { return this.state !== "ko" && this.state !== "knockdown" && this.hitstun <= 0 && this.blockstun <= 0 && this.state !== "attack" && !this.airborne; }

  request(kind, g) {
    if (this.state === "ko") return;
    if (!this.canAct()) { this.buffer = { kind, g }; this.bufferT = 0.16; return; }
    this._start(kind, g);
  }
  _start(kind, g) {
    let move;
    const ci = this.comboIndex % NORMALS.length;   // 押すたびにループする現在位置
    if (kind === "ultimate") {
      this.meter = 0; move = ULTIMATE;        // 満タンで自動発動 → ゲージ0に戻る
    } else if (kind === "special") move = SPECIALS[ci];
    else { move = NORMALS[ci]; this.comboIndex++; }   // 通常攻撃だけがループを進める

    this.state = "attack";
    this.attack = { move, kind, t: 0, fired: false };
    this.hasHit = false;
    if (kind === "ultimate") { Audio_.charge(); }
    else if (kind === "special") Audio_.special();
    else Audio_.whiff(move.dmg > 9 ? 1 : 0, move.pose);
  }

  takeHit(move, fromDir, game) {
    if (this.state === "ko" || this.state === "knockdown") return;  // ダウン中は追撃を受けない
    let dmg = move.dmg; const isUlt = !!move.projectile;
    if (this.blocking && !isUlt) {
      const chip = Math.max(1, Math.round(dmg * 0.18));
      this.hp -= chip; this.blockstun = 0.22; this.vx += fromDir * 120;
      this.meter = Math.min(MAX_METER, this.meter + 4);
      this.hitCombo = 0;
      Audio_.block(); game.fx.spark(this.x, this.y - 110, fromDir, "#bcd6ff", 8);
      game.showCallout("GUARD", "#bcd6ff");
      if (this.hp <= 0) this._ko(game, fromDir, false);
      return;
    }
    // カウンター：相手の攻撃の出かかり/持続中につぶした
    const counter = !isUlt && this.state === "attack" && this.attack && this.attack.t <= this.attack.move.he;
    if (counter) dmg = Math.round(dmg * 1.4);
    // コンボ：のけぞり/ダウン/空中＝連続ヒット中
    const comboing = this.state === "hit" || this.airborne;
    this.hitCombo = comboing ? this.hitCombo + 1 : 1;

    this.hp -= dmg;
    this.attack = null;
    this.flash = 0.2;
    this.meter = Math.min(MAX_METER, this.meter + Math.round(dmg * 0.6));
    const hx = this.x + fromDir * 24, hy = this.y - 112 + this.airY;
    Audio_.hit(dmg > 12 ? 1 : 0, move.pose);

    // ===== 手応えの可視化（数字・コンボ・コール） =====
    const atkIdx = (this === game.p1) ? 1 : 0;     // 攻撃側
    game.fx.dmgNum(hx, hy - 16, dmg, isUlt || dmg >= 16 || counter);
    if (!game.firstHit && game.state === "fight") { game.firstHit = true; game.showCallout("FIRST ATTACK!", "#9fe8ff"); }
    else if (counter) game.showCallout("COUNTER!", "#ff7be0");
    if (this.hitCombo >= 2) game.showCombo(this.hitCombo, atkIdx, this.x, this.y - 196 + this.airY);

    // この攻撃でダウンするか？（キック・特別技・必殺技・打ち上げ技）
    const knockdown = isUlt || !!move.lunge || !!move.up || dmg >= 13;
    const fatal = this.hp <= 0;

    // コンボが伸びるほど派手さが増す（脳汁ブースト）
    const cc = Math.min(6, this.hitCombo || 1);
    const juice = 1 + (cc - 1) * 0.14;

    if (isUlt) {
      // ===== 必殺技ヒット：超派手・シネマ演出 =====
      game.hitstop = Math.max(game.hitstop, 0.38);          // ガッと止める（インパクト）
      game.setSlow(1.05, 0.11);                             // 深く長いスローモー
      game.cineZoom(0.9, hx, hy, 0.40);                     // 衝撃点へ大ズーム
      game.shake = Math.max(game.shake, 56);
      game.flash = 0.6; game.flashMax = 0.6; game.flashColor = "#ffffff";
      game.showCallout(fatal ? "FINISH!!" : "BREAK!", fatal ? "#ffd23d" : "#9fe8ff");
      // 多重衝撃波（速さ違いで層になる）
      game.fx.megashock(hx, hy);
      game.fx.burst(hx, hy, "#ffffff");
      game.fx.burst(hx, hy, "#baf0ff");
      game.fx.speedlines(hx, hy, "#ffffff");
      game.fx.speedlines(hx, hy, "#bfe8ff");
      game.fx.blast(hx, hy, "#cde0ff", 84, 2.1);
      game.fx.blast(hx, hy, "#ffffff", 38, 1.4);
      game.fx.blast(hx, hy, "#ffd36b", 32, 1.2);
    } else if (knockdown) {
      // ===== 大技ヒット：ドカン！と派手に =====
      game.hitstop = Math.max(game.hitstop, 0.17);
      game.setSlow(0.5 * juice, 0.15);                      // しっかり効くスロー
      game.cineZoom(0.24, hx, hy, 0.16);                    // ズームパンチ
      game.shake = Math.max(game.shake, (20 + dmg) * juice);
      if (game.flash < 0.1) { game.flash = 0.1; game.flashMax = 0.18; game.flashColor = "#fff2c8"; } // 控えめに
      game.fx.megashock(hx, hy);
      game.fx.speedlines(hx, hy, "#ffe39a");
      game.fx.burst(hx, hy, "#fff2b0");
      game.fx.ring(hx, hy, "#fff2b0");
      game.fx.blast(hx, hy, "#ffd36b", 36, 1.3);
      game.fx.blast(hx, hy, "#ffffff", 18, 0.9);
    } else {
      // ===== 軽い打撃：それでも気持ちよく弾ける =====
      game.hitstop = Math.max(game.hitstop, 0.09);
      game.setSlow(0.16, 0.1);                              // 一瞬キュッと止まるキレ
      game.cineZoom(0.14, hx, hy, 0.07);                    // 小さなズームパンチ
      game.shake = Math.max(game.shake, (12 + dmg) * juice);
      // 軽い打撃では画面フラッシュなし（明るくなりすぎ防止）
      game.fx.spark(hx, hy, fromDir, "#ffd36b", 20 + dmg);
      game.fx.ring(hx, hy, "#fff2b0");
      game.fx.burst(hx, hy, "#fff6cf");
      game.fx.blast(hx, hy, "#ffd36b", 16, 0.9);
      if (cc >= 3) game.fx.speedlines(hx, hy, "#ffe39a");   // コンボが乗ると速度線
    }

    if (fatal) { this._ko(game, fromDir, isUlt); return; }

    if (knockdown) {
      // 回転しながら吹っ飛ぶ
      this.state = "knockdown"; this.prone = false; this.bounced = false;
      this.hitstun = 999; this.downTimer = 0.75;
      const p = isUlt ? 1.0 : 0.6;
      this.vx = fromDir * (isUlt ? 880 : 320 + dmg * 12);
      this.airVY = -(isUlt ? 560 : 320 + dmg * 7);
      this.tumbleV = fromDir * (isUlt ? 15 : 8 + dmg * 0.2);
    } else {
      // のけぞりのみ
      this.state = "hit";
      this.hitstun = 0.26 + dmg * 0.012;
      this.hitstunMax = this.hitstun;                 // のけぞりアニメ用
      this.hitMag = Math.min(1.4, 0.7 + dmg * 0.05);  // ダメージで仰け反り量
      this.vx += fromDir * move.kb;
      if (move.up) this.airVY = move.up;
    }
  }
  _ko(game, fromDir, big) {
    this.hp = 0; this.state = "ko"; this.koTimer = 0;
    fromDir = fromDir || this.facing * -1;
    // 派手にぶっ飛ばしてからダウン
    this.vx = fromDir * (big ? 760 : 300);
    this.airVY = big ? -480 : -300;
    this.tumbleV = fromDir * (big ? 13 : 7);
    Audio_.ko(); game.onKO(this);
  }

  update(dt, opp, game) {
    this.clock += dt;
    if (this.flash > 0) this.flash -= dt;
    // 髪・帯のなびき：移動・上下動・転倒の勢いに遅れて追従するバネ
    {
      let tgt = Math.max(-1.4, Math.min(1.4, -this.vx * 0.03)); // 進行方向と逆へ流れる
      tgt += Math.max(-1, Math.min(1, this.airVY * 0.004));      // 上下動でふわっと
      if (this.state === "attack" && this.attack) tgt -= this.facing * 0.5; // 振りで揺れる
      this.hairSwayV += (tgt - this.hairSway) * 120 * dt;        // 剛性
      this.hairSwayV -= this.hairSwayV * 10 * dt;                // 減衰
      this.hairSway += this.hairSwayV * dt;
    }
    if (this.bufferT > 0) { this.bufferT -= dt; if (this.bufferT <= 0) this.buffer = null; }

    // --- 吹っ飛び / 打ち上げ / ダウン / KO 物理 ---
    const downed = this.state === "knockdown" || this.state === "ko";
    if (downed) {
      if (!this.prone) {
        this.airVY += 1500 * dt;
        this.airY += this.airVY * dt;
        this.tumble += this.tumbleV * dt;
        this.vx *= Math.pow(0.3, dt);
        // 壁でバウンド
        if ((this.x <= FLOOR_MIN + 1 && this.vx < 0) || (this.x >= FLOOR_MAX - 1 && this.vx > 0)) {
          this.vx *= -0.45; this.tumbleV *= -0.6;
          game.shake = Math.max(game.shake, 12);
          game.fx.blast(this.x, this.y - 70 + this.airY, "#ffd9a0", 14, 0.9);
        }
        if (this.airY >= 0) {
          this.airY = 0;
          if (!this.bounced && this.airVY > 320) {       // 地面で1回バウンド
            this.bounced = true; this.airVY = -this.airVY * 0.5; this.vx *= 0.55;
            game.shake = Math.max(game.shake, 9);
            game.fx.blast(this.x, this.y, "#c9b79a", 16, 0.8);
            game.fx.ring(this.x, this.y - 6, "#e9dcc0");
          } else {                                       // 着地してダウン
            this.airVY = 0; this.prone = true; this.tumbleV = 0;
            this.tumbleTarget = (this.vx >= 0 ? 1 : -1) * 1.45;
            game.fx.spark(this.x, this.y, 1, "#b7a98c", 10);
          }
        }
      } else {
        this.tumble += (this.tumbleTarget - this.tumble) * Math.min(1, dt * 12);
        this.vx *= Math.pow(0.02, dt);
        if (this.state === "knockdown") {
          this.downTimer -= dt;
          if (this.downTimer <= 0) {                     // 起き上がる
            this.state = "idle"; this.prone = false; this.bounced = false;
            this.hitstun = 0; this.tumble = 0; this.tumbleV = 0;
          }
        }
      }
    } else if (this.airborne || this.airVY < 0) {
      this.airVY += 1100 * dt; this.airY += this.airVY * dt;
      if (this.airY >= 0) { this.airY = 0; this.airVY = 0; if (this.state === "hit") this.hitstun = Math.min(this.hitstun, 0.12); }
    }

    if (this.hitstun > 0 && this.state !== "knockdown") this.hitstun -= dt;
    if (this.blockstun > 0) this.blockstun -= dt;
    if (this.state === "hit" && this.hitstun <= 0 && !this.airborne) this.state = "idle";
    if (this.state === "block" && this.blockstun <= 0) this.state = "idle";

    // 攻撃進行
    if (this.state === "attack" && this.attack) {
      const a = this.attack, m = a.move;
      a.t += dt;
      // 打点で前へ踏み込む（攻撃に体重を乗せる）
      if (!a.stepped && a.t >= m.hs) {
        a.stepped = true;
        const st = m.lunge ? m.lunge : Math.min(230, 90 + m.dmg * 9);
        this.vx += st * this.facing;
        if (m.dmg >= 14 || m.lunge) game.shake = Math.max(game.shake, 4);
      }
      // 大車輪：叩きつけの着地で地面が砕ける（外しても重く見せる）
      if (m.pose === "spin" && !a.slammed && a.t >= m.he) {
        a.slammed = true;
        const gx = this.x + this.facing * 34;
        game.shake = Math.max(game.shake, 16);
        game.fx.shock(gx, this.y - 4, "#b8a89a");
        game.fx.ring(gx, this.y - 4, "#caa");
        game.fx.spark(gx, this.y, -this.facing, "#9a8f86", 16);
        game.fx.spark(gx, this.y, this.facing, "#9a8f86", 12);
      }
      // 必殺技の発射（発動カットイン）
      if (m.projectile && !a.fired && a.t >= m.hs) {
        a.fired = true;
        Audio_.ultimate();
        game.spawnProjectile(this);
        this.vx -= this.facing * 260;                          // 反動でのけぞる
        game.shake = Math.max(game.shake, 24);
        game.hitstop = Math.max(game.hitstop, 0.08);          // 撃つ瞬間に一瞬タメ
        game.setSlow(0.45, 0.26);                             // 発動スロー
        game.flash = 0.32; game.flashMax = 0.32; game.flashColor = "#dff2ff";
        const sx = this.x + this.facing * 30, sy = this.y - 110;
        game.fx.megashock(sx, sy);                            // 発射の衝撃波
        game.fx.speedlines(sx, sy, "#cfeaff");
        game.fx.blast(sx, sy, "#cde0ff", 48, 1.4);
        game.fx.burst(sx, sy, "#ffffff");
        // 足元の砂煙＆地割れの噴き出し
        game.fx.spark(this.x, this.y, -this.facing, "#8a8290", 18);
        game.fx.shock(this.x, this.y - 4, "#caa");
      }
      if (a.t >= m.dur) { this.state = "idle"; this.attack = null; }
    }

    // 向き（行動可能時のみ相手の方へ）
    if (this.canAct()) {
      const d = opp.x - this.x; if (Math.abs(d) > 6) this.facing = d > 0 ? 1 : -1;
    }

    // ゲージ満タン → 必殺技を自動発動（プレイヤー・CPU共通）
    if (this.meter >= MAX_METER && game.state === "fight" && this.canAct()) {
      this.buffer = null; this._start("ultimate");
    }

    // 入力バッファ消化
    if (this.buffer && this.canAct()) { const b = this.buffer; this.buffer = null; this._start(b.kind, b.g); }

    // 移動意図 & ガード（blocking は checkCombat まで保持する）
    this.blocking = false;
    const cmd = this.cmdDir || 0;
    if (this.canAct()) {
      if (this.state === "walk" || this.state === "block") this.state = "idle";
      const toOpp = Math.sign(opp.x - this.x) || 1;
      if (cmd !== 0) {
        if (cmd === -toOpp && opp.state === "attack") { this.blocking = true; this.state = "block"; }
        else { this.vx = cmd * 440; this.state = "walk"; this.walkPhase += 0.4; }
      }
    }
    this.cmdDir = 0;

    // 摩擦・移動（吹っ飛び中は専用減衰を使うのでスキップ）
    if (!downed) {
      this.vx *= Math.pow(0.0008, dt);
      if (Math.abs(this.vx) < 4) this.vx = 0;
    }
    this.x += this.vx * dt;
    this.x = Math.max(FLOOR_MIN, Math.min(FLOOR_MAX, this.x));
  }

  // プレイヤー/AIから呼ぶ移動コマンド（意図だけ記録、処理は update 内）
  walk(dir) { this.cmdDir = dir; }

  /* ---------- 描画 ---------- */
  getReachBox() {
    if (this.state !== "attack" || !this.attack) return null;
    const a = this.attack, m = a.move;
    if (m.projectile) return null;
    if (a.t < m.hs || a.t > m.he) return null;
    const cx = this.x + this.facing * (m.reach * 0.55);
    const cy = this.y - 112 + (m.up < -100 ? -50 : 0) - (-this.airY);
    const w = m.reach, h = 96;
    return { x: cx - w / 2, y: cy - h / 2, w, h, dir: this.facing, move: m };
  }
  hurtBox() {
    const top = this.y - 176 - (-this.airY);
    return { x: this.x - 34, y: top, w: 68, h: 176 };
  }

  currentPose() {
    let p = basePose();
    // 呼吸 / 歩行の上下動
    const breathe = Math.sin(this.clock * 2.2) * 2;
    p.hipH += breathe;
    if (this.state === "walk") p.hipH += Math.abs(Math.sin(this.walkPhase)) * 6;
    if (this.state === "block") { p = blendPose(p, 1, { fSh: 1.3, fEl: 2.7, bSh: 1.25, bEl: 2.6, lean: -0.25, hipH: 86 }); }
    if (this.state === "hit") {
      // のけぞり：被弾の瞬間に大きく仰け反り、ブルッと震えてから戻る
      const hm = this.hitstunMax || 0.3;
      const pr = Math.max(0, Math.min(1, this.hitstun / hm));   // 1=被弾直後 → 0=回復
      const el = hm - this.hitstun;                             // 経過時間
      const mag = this.hitMag || 1;
      const flinch = Math.min(1, pr * mag);
      const jitter = Math.sin(el * 58) * 0.12 * pr;             // 衝撃のブレ
      p = blendPose(p, flinch, {
        lean: -0.85 + jitter,                                  // 後ろへ仰け反る
        fSh: 0.1, bSh: 0.75, fEl: 1.35, bEl: 1.75,             // 腕が跳ね上がる
        hipH: 86 - 6 * Math.sin(el * 26),                      // 上体のあおり
        bHip: -0.5, fHip: 0.55, fKnee: 0.3,
      });
    }
    if (this.state === "knockdown" || this.state === "ko") {
      if (!this.prone && this.airborne) {
        // 吹っ飛び中：手足を風車のようにバタつかせる
        const w = this.clock * 13;
        p = blendPose(p, 0.85, {
          hipH: 92, lean: -0.25,
          bHip: 0.5 + Math.sin(w) * 0.45, fHip: -0.45 + Math.sin(w + 2.1) * 0.45,
          bKnee: 0.25 + Math.sin(w + 1) * 0.3, fKnee: -0.3 + Math.sin(w + 3) * 0.3,
          bSh: -0.5 + Math.sin(w + 1.5) * 0.7, fSh: 0.6 + Math.sin(w + 3.2) * 0.7,
          bEl: 0.4, fEl: -0.3,
        });
      } else {
        // 着地後は手足を投げ出して伸びる（回転は draw 側で付与）
        p = this.prone
          ? blendPose(p, 1, { hipH: 96, lean: 0, bHip: 0.1, fHip: -0.1, bKnee: 0.1, fKnee: -0.1, bSh: 0.5, fSh: -0.4, bEl: 0.4, fEl: -0.3 })
          : blendPose(p, 0.8, { hipH: 92, lean: -0.2, bHip: 0.5, fHip: -0.4, bKnee: 0.3, fKnee: -0.3, bSh: -0.5, fSh: 0.6 });
      }
    }
    if (this.state === "attack" && this.attack) {
      const a = this.attack, m = a.move, tn = a.t;
      const kf = moveKeyframes(m);
      const wind = fullPose(kf.windup), strike = fullPose(kf.strike);
      if (tn < m.hs) {
        // タメ（予備動作）：ゆっくり引く
        const k = m.hs > 0 ? tn / m.hs : 1;
        p = mixPose(p, wind, k * (2 - k));               // easeOut
      } else if (tn <= m.he) {
        // 振り抜き：一気にスナップして伸び切る
        const k = (tn - m.hs) / Math.max(0.001, m.he - m.hs);
        const e = 1 - Math.pow(1 - k, 3);                // easeOutCubic（速い立ち上がり）
        p = mixPose(wind, strike, e);
      } else {
        // 戻り
        const k = (tn - m.he) / Math.max(0.001, m.dur - m.he);
        p = mixPose(strike, p, k * k);                   // easeIn
      }
    }
    return p;
  }

  draw(ctx) {
    const p = this.currentPose();
    const f = this.facing;
    // ジャンプ攻撃の跳び上がりアーク（見た目のみ）
    let hop = 0;
    if (this.state === "attack" && this.attack && this.attack.move.hop) {
      const m = this.attack.move, pr = Math.max(0, Math.min(1, this.attack.t / m.dur));
      hop = -Math.sin(pr * Math.PI) * m.hop;
    }
    const baseY = this.y + this.airY + hop; // 上方向ほど小さい(負)
    ctx.save();
    ctx.translate(this.x, baseY);

    // 足元の影（地面に固定し、高さに応じて縮小）
    const groundLocal = this.y - baseY;       // 地面までのローカル距離(>=0)
    ctx.save();
    ctx.globalAlpha = Math.max(0.12, 0.4 - groundLocal * 0.0016);
    ctx.fillStyle = "#000";
    ctx.beginPath();
    ctx.ellipse(0, groundLocal, Math.max(16, 58 - groundLocal * 0.16), Math.max(5, 11 - groundLocal * 0.03), 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // 吹っ飛び・ダウンの回転（足元を軸に倒れる）
    if (this.state === "knockdown" || this.state === "ko") ctx.rotate(this.tumble);

    // 関節計算（ローカル, 足元=0。a=0 で真下、+a で前方向へ）
    const seg = (ox, oy, a, len) => ({ x: ox + Math.sin(a) * f * len, y: oy + Math.cos(a) * len });

    const hip = { x: 0, y: -p.hipH };
    const shoulder = { x: hip.x + Math.sin(p.lean) * f * 64, y: hip.y - Math.cos(p.lean) * 64 };
    const neck = { x: lerp(hip.x, shoulder.x, 1.06), y: lerp(hip.y, shoulder.y, 1.06) };
    const head = { x: neck.x + Math.sin(p.lean) * f * 6, y: neck.y - 20 };

    // 攻撃時、当てにいく手足を伸ばす（タメで縮め→振り抜きで伸び切る）
    let mUAf = 1, mFAf = 1, mUAb = 1, mFAb = 1, mTHf = 1, mSHf = 1, mTHb = 1, mSHb = 1;
    if (this.state === "attack" && this.attack) {
      const a = this.attack, m = a.move, tn = a.t;
      let s; // 伸縮量(-:縮む / +:伸びる)
      if (tn < m.hs) { const k = m.hs > 0 ? tn / m.hs : 1; s = -0.22 * (k * (2 - k)); }
      else if (tn <= m.he) { const k = (tn - m.hs) / Math.max(0.001, m.he - m.hs); s = 1 - Math.pow(1 - k, 3); }
      else { const k = (tn - m.he) / Math.max(0.001, m.dur - m.he); s = Math.max(0, 1 - k * k); }
      // 大きく伸ばす（前腕・すねを主役に、上腕・ももも追従）
      const up = 1 + 0.40 * s, fore = 1 + 1.05 * s, th = 1 + 0.34 * s, sh = 1 + 1.10 * s;
      if (m.pose === "kick") { if (m.arm === "back") { mTHb = th; mSHb = sh; } else { mTHf = th; mSHf = sh; } }
      else if (m.pose === "jumpkick") { mTHf = th; mSHf = sh; }
      else if (m.pose === "spin") { mUAf = mUAb = up; mFAf = mFAb = fore; }
      else if (m.pose === "upper" || m.pose === "push") { mUAf = up; mFAf = fore; }
      else if (m.arm === "back") { mUAb = up; mFAb = fore; }
      else { mUAf = up; mFAf = fore; }
    }

    const UA = 34, FA = 30, TH = 48, SH = 48;
    const bElbow = seg(shoulder.x, shoulder.y, p.bSh, UA * mUAb);
    const bHand = seg(bElbow.x, bElbow.y, p.bEl, FA * mFAb);
    const fElbow = seg(shoulder.x, shoulder.y, p.fSh, UA * mUAf);
    const fHand = seg(fElbow.x, fElbow.y, p.fEl, FA * mFAf);
    const bKnee = seg(hip.x, hip.y, p.bHip, TH * mTHb);
    const bFoot = seg(bKnee.x, bKnee.y, p.bKnee, SH * mSHb);
    const fKnee = seg(hip.x, hip.y, p.fHip, TH * mTHf);
    const fFoot = seg(fKnee.x, fKnee.y, p.fKnee, SH * mSHf);

    const C = this.colors;
    const flashing = this.flash > 0 && Math.floor(this.flash * 30) % 2 === 0;
    const skin = flashing ? "#ffffff" : C.skin;
    const cloth = flashing ? "#ffffff" : C.cloth;
    const cloth2 = flashing ? "#ffffff" : C.cloth2;

    // 先細り・円筒陰影・ハイライト付きの「筋肉的な」手足
    function limb(x1, y1, x2, y2, w, col, edge) {
      const dx = x2 - x1, dy = y2 - y1, len = Math.hypot(dx, dy) || 1;
      const nx = -dy / len, ny = dx / len;            // 法線
      const r1 = w / 2, r2 = Math.max(2.5, w * 0.34); // 付け根→先端で先細り
      const TWO = Math.PI * 2;
      const quad = (a, b) => {
        ctx.beginPath();
        ctx.moveTo(x1 + nx * a, y1 + ny * a);
        ctx.lineTo(x2 + nx * b, y2 + ny * b);
        ctx.lineTo(x2 - nx * b, y2 - ny * b);
        ctx.lineTo(x1 - nx * a, y1 - ny * a);
        ctx.closePath();
      };
      // 輪郭（少し太らせた暗色レイヤ）
      ctx.fillStyle = edge;
      quad(r1 + 2, r2 + 2); ctx.fill();
      ctx.beginPath(); ctx.arc(x1, y1, r1 + 2, 0, TWO); ctx.fill();
      ctx.beginPath(); ctx.arc(x2, y2, r2 + 2, 0, TWO); ctx.fill();
      // 本体（断面方向のグラデで円筒感）
      const g = ctx.createLinearGradient(x1 + nx * r1, y1 + ny * r1, x1 - nx * r1, y1 - ny * r1);
      g.addColorStop(0, shade(col, 0.20));
      g.addColorStop(0.45, col);
      g.addColorStop(1, shade(col, -0.26));
      ctx.fillStyle = g;
      quad(r1, r2); ctx.fill();
      ctx.beginPath(); ctx.arc(x1, y1, r1, 0, TWO); ctx.fill();
      ctx.beginPath(); ctx.arc(x2, y2, r2, 0, TWO); ctx.fill();
      // 光沢ハイライト（片側に細く）
      const off1 = r1 * 0.42, off2 = r2 * 0.42, hw1 = r1 * 0.34, hw2 = r2 * 0.34;
      ctx.fillStyle = "rgba(255,255,255,0.16)";
      ctx.beginPath();
      ctx.moveTo(x1 + nx * (off1 + hw1), y1 + ny * (off1 + hw1));
      ctx.lineTo(x2 + nx * (off2 + hw2), y2 + ny * (off2 + hw2));
      ctx.lineTo(x2 + nx * (off2 - hw2), y2 + ny * (off2 - hw2));
      ctx.lineTo(x1 + nx * (off1 - hw1), y1 + ny * (off1 - hw1));
      ctx.closePath(); ctx.fill();
    }
    const edge = flashing ? "#ffffff" : "#0a0c18";
    const B = this.build, lw = B.limbW;       // 体格：手足の太さ倍率

    // 奥脚・奥腕（暗め）
    limb(hip.x, hip.y, bKnee.x, bKnee.y, 17 * lw, shade(cloth2, -.25), edge);
    limb(bKnee.x, bKnee.y, bFoot.x, bFoot.y, 13 * lw, shade(skin, -.25), edge);
    drawFoot(ctx, bKnee, bFoot, f, shade(C.shoe, -.2), edge);
    limb(shoulder.x, shoulder.y, bElbow.x, bElbow.y, 13 * lw, shade(cloth, -.22), edge);
    limb(bElbow.x, bElbow.y, bHand.x, bHand.y, 11 * lw, shade(skin, -.22), edge);
    drawHand(ctx, bHand, 9 * lw, shade(skin, -.22), edge);

    // 胴（トルソ：肩〜腰のテーパー）
    drawTorso(ctx, hip, shoulder, f, cloth, cloth2, edge, C.belt, B.torsoW);

    // 手前脚・手前腕（明るい）
    limb(hip.x, hip.y, fKnee.x, fKnee.y, 18 * lw, cloth2, edge);
    limb(fKnee.x, fKnee.y, fFoot.x, fFoot.y, 14 * lw, skin, edge);
    drawFoot(ctx, fKnee, fFoot, f, C.shoe, edge);

    // 頭
    drawHead(ctx, head, f, skin, edge, C, B, this.hairSway);

    limb(shoulder.x, shoulder.y, fElbow.x, fElbow.y, 14 * lw, cloth, edge);
    limb(fElbow.x, fElbow.y, fHand.x, fHand.y, 12 * lw, skin, edge);
    drawHand(ctx, fHand, 10 * lw, skin, edge);

    // 必殺技チャージ/発生オーラ
    if (this.state === "attack" && this.attack && this.attack.move.projectile) {
      const a = this.attack;
      const gx = shoulder.x + f * 22, gy = (shoulder.y + hip.y) / 2;
      const r = 10 + Math.min(28, a.t * 90);
      const grd = ctx.createRadialGradient(gx, gy, 0, gx, gy, r);
      grd.addColorStop(0, "rgba(120,220,255,.95)");
      grd.addColorStop(0.5, "rgba(90,150,255,.6)");
      grd.addColorStop(1, "rgba(90,150,255,0)");
      ctx.fillStyle = grd; ctx.beginPath(); ctx.arc(gx, gy, r, 0, Math.PI * 2); ctx.fill();
    }

    // 攻撃の軌跡(swoosh)用に、振っている手/足の先端をワールド座標で記録
    let tipW = null;
    if (this.state === "attack" && this.attack) {
      const m = this.attack.move, at = this.attack.t;
      if (!m.projectile && at >= m.hs - 0.03 && at <= m.he + 0.05) {
        let tp = (m.pose === "kick") ? (m.arm === "back" ? bFoot : fFoot)
               : (m.arm === "back" ? bHand : fHand);
        if (m.pose === "upper" || m.pose === "push") tp = fHand;
        tipW = { x: this.x + tp.x, y: baseY + tp.y };
      }
    }
    ctx.restore();

    // 軌跡の更新＆描画（ワールド座標・残像）
    if (tipW) { this.trail.push(tipW); if (this.trail.length > 9) this.trail.shift(); }
    else if (this.trail.length) this.trail.length = 0;
    if (this.trail.length > 1) drawTrail(ctx, this.trail);
  }
}

// 攻撃の残像（光るスウッシュ）
function drawTrail(ctx, pts) {
  ctx.save();
  ctx.lineCap = "round"; ctx.lineJoin = "round";
  const n = pts.length;
  for (let layer = 0; layer < 2; layer++) {
    for (let i = 1; i < n; i++) {
      const f = i / (n - 1);              // 新しいほど太く濃く
      ctx.beginPath();
      ctx.moveTo(pts[i - 1].x, pts[i - 1].y);
      ctx.lineTo(pts[i].x, pts[i].y);
      if (layer === 0) { ctx.strokeStyle = "rgba(150,205,255," + (0.16 * f).toFixed(3) + ")"; ctx.lineWidth = 8 + 34 * f; }
      else { ctx.strokeStyle = "rgba(255,255,255," + (0.55 * f).toFixed(3) + ")"; ctx.lineWidth = 2 + 13 * f; }
      ctx.stroke();
    }
  }
  ctx.restore();
}

/* 描画ヘルパ */
function shade(hex, amt) {
  const c = hex.replace("#", "");
  let r = parseInt(c.substr(0, 2), 16), g = parseInt(c.substr(2, 2), 16), b = parseInt(c.substr(4, 2), 16);
  r = Math.max(0, Math.min(255, r + amt * 255));
  g = Math.max(0, Math.min(255, g + amt * 255));
  b = Math.max(0, Math.min(255, b + amt * 255));
  return `rgb(${r | 0},${g | 0},${b | 0})`;
}
function drawTorso(ctx, hip, sh, f, cloth, cloth2, edge, belt, tw) {
  tw = tw || 1;                                       // 体格：胴幅の倍率
  const hw = 15 * tw, sw = 25 * tw, waistY = lerp(sh.y, hip.y, 0.52);
  const ax = sh.x - hip.x, ay = sh.y - hip.y, al = Math.hypot(ax, ay) || 1;
  const px = -ay / al, py = ax / al;                 // 体軸の法線（横方向）
  const waistX = lerp(hip.x, sh.x, 0.52), ww = 13 * tw;
  // 胴シルエット（肩広→腰くびれの逆三角）
  ctx.beginPath();
  ctx.moveTo(hip.x - px * hw, hip.y - py * hw);
  ctx.quadraticCurveTo(waistX - px * ww, waistY - py * ww, sh.x - px * sw, sh.y - py * sw);
  ctx.quadraticCurveTo(sh.x, sh.y - 9, sh.x + px * sw, sh.y + py * sw);
  ctx.quadraticCurveTo(waistX + px * ww, waistY + py * ww, hip.x + px * hw, hip.y + py * hw);
  ctx.quadraticCurveTo(hip.x, hip.y + 9, hip.x - px * hw, hip.y - py * hw);
  ctx.closePath();
  const grd = ctx.createLinearGradient(sh.x - px * sw, sh.y, sh.x + px * sw, sh.y);
  grd.addColorStop(0, shade(cloth, .12)); grd.addColorStop(0.45, cloth);
  grd.addColorStop(1, shade(cloth, -.30));
  ctx.fillStyle = grd; ctx.fill();
  ctx.lineWidth = 4; ctx.strokeStyle = edge; ctx.lineJoin = "round"; ctx.stroke();
  // 道着の前合わせ（中心線）と胸の陰影
  ctx.save();
  ctx.clip();
  ctx.strokeStyle = shade(cloth, -.34); ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(sh.x + px * f * 2, sh.y);
  ctx.lineTo(waistX + px * f * 6, waistY);
  ctx.lineTo(hip.x, hip.y); ctx.stroke();
  // 胸筋の分割ライン
  const pecY = lerp(sh.y, waistY, 0.5);
  ctx.lineWidth = 2; ctx.strokeStyle = "rgba(0,0,0,0.18)";
  ctx.beginPath();
  ctx.moveTo(sh.x - px * sw * 0.6, sh.y + 6);
  ctx.quadraticCurveTo(waistX, pecY, waistX, pecY); ctx.stroke();
  // 道着の影（奥側を暗く）
  const sg = ctx.createLinearGradient(sh.x - px * sw, sh.y, sh.x + px * sw, sh.y);
  sg.addColorStop(0, "rgba(0,0,0,0)"); sg.addColorStop(1, "rgba(0,0,0,0.22)");
  ctx.fillStyle = sg; ctx.fill();
  ctx.restore();
  // ベルト（結び目付き）
  ctx.strokeStyle = shade(belt, -.2); ctx.lineWidth = 11; ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(hip.x - px * hw, hip.y - 3); ctx.lineTo(hip.x + px * hw, hip.y - 3); ctx.stroke();
  ctx.strokeStyle = belt; ctx.lineWidth = 8;
  ctx.beginPath(); ctx.moveTo(hip.x - px * hw, hip.y - 4); ctx.lineTo(hip.x + px * hw, hip.y - 4); ctx.stroke();
  ctx.fillStyle = belt;
  ctx.beginPath(); ctx.arc(hip.x + f * 4, hip.y - 3, 5, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = belt; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(hip.x + f * 4, hip.y); ctx.lineTo(hip.x + f * 9, hip.y + 14); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(hip.x + f * 2, hip.y); ctx.lineTo(hip.x - f * 2, hip.y + 13); ctx.stroke();
}
function drawHead(ctx, head, f, skin, edge, C, B, sway) {
  B = B || {};
  const R = B.headR || 15;
  const style = B.hair || "spike";
  const sw = sway || 0, lift = -Math.abs(sw) * 0.25;   // なびきの横ずれ／浮き
  ctx.save();
  ctx.lineJoin = "round";

  // 後ろ髪（ポニーテール：spikeタイプ）— 顔より背面なので先に描く
  if (style === "ponytail" || style === "spike") {
    const bx = head.x - f * (R - 5), by = head.y - R + 5;
    ctx.fillStyle = shade(C.hair, -.08);
    ctx.beginPath();
    ctx.moveTo(bx, by);
    ctx.quadraticCurveTo(head.x - f * (R + 11) + sw * 0.7, head.y - 1 + lift, head.x - f * (R + 9) + sw, head.y + 18);
    ctx.quadraticCurveTo(head.x - f * (R + 7) + sw * 1.3, head.y + 33, head.x - f * (R + 16) + sw * 1.7, head.y + 39);
    ctx.quadraticCurveTo(head.x - f * (R + 1) + sw * 1.1, head.y + 28, head.x - f * 2, head.y + 4);
    ctx.closePath(); ctx.fill();
    ctx.lineWidth = 2; ctx.strokeStyle = shade(C.hair, -.3); ctx.stroke();
    ctx.fillStyle = C.band;                               // 結び目
    ctx.beginPath(); ctx.arc(bx - f * 2, by + 3, 3.5, 0, Math.PI * 2); ctx.fill();
  }

  // 首
  ctx.strokeStyle = edge; ctx.lineCap = "round"; ctx.lineWidth = 18;
  ctx.beginPath(); ctx.moveTo(head.x - f * 2, head.y + 8); ctx.lineTo(head.x - f * 2, head.y + 22); ctx.stroke();
  ctx.strokeStyle = shade(skin, -.12); ctx.lineWidth = 14;
  ctx.beginPath(); ctx.moveTo(head.x - f * 2, head.y + 8); ctx.lineTo(head.x - f * 2, head.y + 22); ctx.stroke();
  // 顔（やや卵型・あご）
  ctx.beginPath();
  ctx.moveTo(head.x - f * R, head.y - 2);
  ctx.quadraticCurveTo(head.x - f * R, head.y - R, head.x, head.y - R);
  ctx.quadraticCurveTo(head.x + f * R, head.y - R, head.x + f * R, head.y - 1);
  ctx.quadraticCurveTo(head.x + f * R * 0.95, head.y + R * 0.7, head.x + f * 3, head.y + R * 0.95); // あご
  ctx.quadraticCurveTo(head.x - f * 4, head.y + R * 0.7, head.x - f * R, head.y - 2);
  ctx.closePath();
  const fg = ctx.createLinearGradient(head.x - R, head.y, head.x + R, head.y);
  fg.addColorStop(f > 0 ? 0 : 1, shade(skin, .10));
  fg.addColorStop(f > 0 ? 1 : 0, shade(skin, -.16));
  ctx.fillStyle = fg; ctx.fill();
  ctx.lineWidth = 3.5; ctx.strokeStyle = edge; ctx.stroke();
  // 無精ひげ（パワー型）
  if (B.beard) {
    ctx.save(); ctx.clip();
    ctx.fillStyle = "rgba(0,0,0,0.22)";
    ctx.beginPath();
    ctx.moveTo(head.x - f * (R - 3), head.y + R * 0.4);
    ctx.quadraticCurveTo(head.x + f * 2, head.y + R * 1.1, head.x + f * (R - 1), head.y + R * 0.35);
    ctx.lineTo(head.x + f * (R - 1), head.y + R * 0.9);
    ctx.quadraticCurveTo(head.x + f * 2, head.y + R * 1.25, head.x - f * (R - 3), head.y + R * 0.85);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }
  // 耳
  ctx.fillStyle = shade(skin, -.08);
  ctx.beginPath(); ctx.ellipse(head.x - f * (R - 1), head.y + 2, 3.5, 5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.lineWidth = 2; ctx.strokeStyle = edge; ctx.stroke();

  // 髪（トップ）
  ctx.fillStyle = C.hair;
  if (style === "mohawk") {
    // モヒカン：中央の隆起した尖り（両サイドは刈り上げ＝地肌）
    ctx.beginPath();
    ctx.moveTo(head.x - f * (R - 7), head.y - R + 6);
    ctx.lineTo(head.x - f * 5, head.y - R - 11 + lift);
    ctx.lineTo(head.x - f * 1, head.y - R - 2);
    ctx.lineTo(head.x + f * 2 + sw * 0.4, head.y - R - 16 + lift);
    ctx.lineTo(head.x + f * 5, head.y - R - 4);
    ctx.lineTo(head.x + f * 8 + sw * 0.3, head.y - R - 12 + lift);
    ctx.lineTo(head.x + f * (R - 6), head.y - R + 7);
    ctx.closePath(); ctx.fill();
    ctx.lineWidth = 2; ctx.strokeStyle = shade(C.hair, -.3); ctx.stroke();
    // 刈り上げの影
    ctx.fillStyle = "rgba(0,0,0,0.12)";
    ctx.fillRect(head.x - f * R, head.y - R + 4, f * 5, 6);
  } else {
    // スパイク：逆立った毛束（先端がなびく）
    ctx.beginPath();
    ctx.moveTo(head.x - f * R, head.y + 1);
    ctx.quadraticCurveTo(head.x - f * (R + 2), head.y - R - 3, head.x - f * 4 + sw * 0.3, head.y - R - 4 + lift);
    ctx.lineTo(head.x - f * 7 + sw * 0.4, head.y - R - 11 + lift);
    ctx.lineTo(head.x - f * 1 + sw * 0.4, head.y - R - 4 + lift);
    ctx.lineTo(head.x + f * 4 + sw * 0.45, head.y - R - 13 + lift);
    ctx.lineTo(head.x + f * 6 + sw * 0.45, head.y - R - 3 + lift);
    ctx.lineTo(head.x + f * 11 + sw * 0.4, head.y - R - 9 + lift);
    ctx.quadraticCurveTo(head.x + f * (R + 1), head.y - R + 2, head.x + f * R, head.y - 4);
    ctx.lineTo(head.x + f * (R - 4), head.y - 6);
    ctx.quadraticCurveTo(head.x, head.y - R + 1, head.x - f * (R - 5), head.y - 6);
    ctx.closePath(); ctx.fill();
    ctx.lineWidth = 2; ctx.strokeStyle = shade(C.hair, -.25); ctx.stroke();
  }

  // ヘッドバンド（額に巻く）
  ctx.fillStyle = C.band;
  ctx.beginPath();
  ctx.moveTo(head.x - f * (R + 1), head.y - 3);
  ctx.quadraticCurveTo(head.x, head.y - 9, head.x + f * (R + 1), head.y - 4);
  ctx.lineTo(head.x + f * (R + 1), head.y + 1);
  ctx.quadraticCurveTo(head.x, head.y - 4, head.x - f * (R + 1), head.y + 1);
  ctx.closePath(); ctx.fill();
  ctx.lineWidth = 1.5; ctx.strokeStyle = shade(C.band, -.3); ctx.stroke();
  // バンドのなびく帯（揺れに追従）
  ctx.fillStyle = C.band;
  ctx.beginPath();
  ctx.moveTo(head.x - f * (R - 1), head.y - 3);
  ctx.lineTo(head.x - f * (R + 16) + sw, head.y + 4 + lift);
  ctx.lineTo(head.x - f * (R + 15) + sw, head.y + 9 + lift);
  ctx.lineTo(head.x - f * (R - 2), head.y + 2);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(head.x - f * (R - 1), head.y - 2);
  ctx.lineTo(head.x - f * (R + 12) + sw * 1.3, head.y + 12 + lift);
  ctx.lineTo(head.x - f * (R + 9) + sw * 1.3, head.y + 15 + lift);
  ctx.lineTo(head.x - f * (R - 2), head.y + 3);
  ctx.closePath(); ctx.fill();
  // 眉
  ctx.strokeStyle = edge; ctx.lineWidth = 2.2; ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(head.x + f * 3, head.y - 2); ctx.lineTo(head.x + f * 10, head.y - 1); ctx.stroke();
  // 目
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.ellipse(head.x + f * 7, head.y + 3, 3.2, 2.4, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = edge;
  ctx.beginPath(); ctx.arc(head.x + f * 8, head.y + 3, 1.7, 0, Math.PI * 2); ctx.fill();
  // 鼻・口
  ctx.strokeStyle = shade(skin, -.3); ctx.lineWidth = 1.6;
  ctx.beginPath(); ctx.moveTo(head.x + f * (R - 2), head.y + 4); ctx.lineTo(head.x + f * (R - 3), head.y + 7); ctx.stroke();
  ctx.strokeStyle = edge; ctx.lineWidth = 1.6;
  ctx.beginPath(); ctx.moveTo(head.x + f * 7, head.y + 10); ctx.lineTo(head.x + f * 12, head.y + 9); ctx.stroke();
  ctx.restore();
}
function drawHand(ctx, h, r, col, edge) {
  ctx.save();
  // 拳（グローブ風）：本体＋指の段差＋親指
  ctx.lineWidth = 3; ctx.strokeStyle = edge; ctx.lineJoin = "round";
  ctx.beginPath();
  ctx.ellipse(h.x, h.y, r * 1.12, r, 0, 0, Math.PI * 2);
  const g = ctx.createRadialGradient(h.x - r * 0.4, h.y - r * 0.4, 1, h.x, h.y, r * 1.3);
  g.addColorStop(0, shade(col, .22)); g.addColorStop(1, shade(col, -.18));
  ctx.fillStyle = g; ctx.fill(); ctx.stroke();
  // 指の関節ライン
  ctx.strokeStyle = "rgba(0,0,0,0.22)"; ctx.lineWidth = 1.4;
  ctx.beginPath(); ctx.moveTo(h.x - r * 0.7, h.y - r * 0.3); ctx.lineTo(h.x + r * 0.7, h.y - r * 0.45); ctx.stroke();
  // 親指
  ctx.fillStyle = shade(col, .05); ctx.lineWidth = 2.5; ctx.strokeStyle = edge;
  ctx.beginPath(); ctx.ellipse(h.x, h.y + r * 0.55, r * 0.45, r * 0.62, 0, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  ctx.restore();
}
function drawFoot(ctx, knee, foot, f, col, edge) {
  ctx.save();
  ctx.translate(foot.x, foot.y);
  // つま先が進行方向（脚の向き）を向くよう、軽く傾ける
  const ang = Math.atan2(foot.x - knee.x, -(foot.y - knee.y)); // 脚のかたむき
  ctx.rotate(Math.max(-0.5, Math.min(0.5, ang * 0.25)));
  ctx.lineJoin = "round"; ctx.lineWidth = 3; ctx.strokeStyle = edge;
  // ソール（底）
  ctx.fillStyle = shade(col, -.35);
  ctx.beginPath();
  ctx.moveTo(-13, 4); ctx.lineTo(f * 18, 5);
  ctx.quadraticCurveTo(f * 22, 5, f * 22, 1); ctx.lineTo(-13, 0);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // アッパー（甲）
  const g = ctx.createLinearGradient(0, -8, 0, 4);
  g.addColorStop(0, shade(col, .18)); g.addColorStop(1, shade(col, -.1));
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.moveTo(-12, 1);
  ctx.quadraticCurveTo(-13, -8, -3, -8);
  ctx.quadraticCurveTo(f * 8, -8, f * 16, -2);
  ctx.quadraticCurveTo(f * 20, 0, f * 18, 2);
  ctx.lineTo(-12, 1); ctx.closePath();
  ctx.fill(); ctx.stroke();
  // 足首口
  ctx.fillStyle = shade(col, .25);
  ctx.beginPath(); ctx.ellipse(-f * 2, -6, 5, 3.5, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  ctx.restore();
}

/* =====================================================================
   PROJECTILE（必殺技の飛び道具）
   ===================================================================== */
class Projectile {
  constructor(owner, game) {
    this.owner = owner; this.game = game;
    this.x = owner.x + owner.facing * 46;
    this.y = owner.y - 110;
    this.dir = owner.facing;
    this.vx = 560 * this.dir;
    this.r0 = 48; this.rMax = 128; this.r = this.r0; this.age = 0;
    this.life = 2.4; this.dead = false; this.hasHit = false;
    this.phase = 0; this.trail = []; this.emit = 0; this.spin = 0;
  }
  update(dt) {
    this.age += dt;
    // 飛びながら巨大化（うねる脈動つき）
    const grow = Math.min(1, this.age / 0.55);
    this.r = this.r0 + (this.rMax - this.r0) * grow * grow;
    this.x += this.vx * dt; this.phase += dt * 16; this.spin += dt * 5; this.life -= dt;
    // 残像の記録
    this.trail.push({ x: this.x, y: this.y, r: this.r }); if (this.trail.length > 14) this.trail.shift();
    // 進行中の地響き＆火花を撒く（貫通後はさらに激しく）
    if (this.game) {
      this.game.shake = Math.max(this.game.shake, this.pierced ? 11 : 7);
      this.emit -= dt;
      if (this.emit <= 0) {
        this.emit = this.pierced ? 0.012 : 0.02;
        this.game.fx.spark(this.x - this.dir * this.r * 0.7, this.y + (Math.random() - 0.5) * this.r * 1.4, -this.dir, "#bfe8ff", this.pierced ? 5 : 3);
      }
    }
    const offEdge = this.x < FLOOR_MIN - 60 || this.x > FLOOR_MAX + 60;
    if (this.life <= 0 || offEdge) {
      this.dead = true;
      // 画面端へ突き抜けた瞬間の爆発フィナーレ
      if (this.pierced && offEdge && this.game) {
        const ex = Math.max(40, Math.min(W - 40, this.x));
        this.game.fx.megashock(ex, this.y);
        this.game.fx.burst(ex, this.y, "#ffffff");
        this.game.fx.blast(ex, this.y, "#cde0ff", 40, 1.5);
        this.game.shake = Math.max(this.game.shake, 26);
        this.game.flash = Math.max(this.game.flash, 0.22); this.game.flashMax = Math.max(this.game.flashMax, 0.22);
      }
    }
  }
  // 当たり判定は見た目よりやや小さめ＆縦長（波のうねり）
  box() { const w = this.r * 1.4, h = this.r * 2.2; return { x: this.x - w / 2, y: this.y - h / 2, w, h }; }
  draw(ctx) {
    ctx.save();
    const r = this.r * (1 + Math.sin(this.phase) * 0.06);
    // 彗星の尾（後方へ伸びる長いビーム）
    const len = r * 5.2, bx = this.x - this.dir * len;
    const lg = ctx.createLinearGradient(bx, this.y, this.x, this.y);
    lg.addColorStop(0, "rgba(110,190,255,0)");
    lg.addColorStop(0.6, "rgba(150,220,255,.35)");
    lg.addColorStop(1, "rgba(220,245,255,.6)");
    ctx.fillStyle = lg;
    ctx.beginPath();
    ctx.moveTo(bx, this.y);
    ctx.quadraticCurveTo((bx + this.x) / 2, this.y - r * 1.1, this.x, this.y - r * 0.3);
    ctx.quadraticCurveTo((bx + this.x) / 2, this.y + r * 1.1, bx, this.y);
    ctx.closePath(); ctx.fill();
    // 残像オーラ
    for (let i = 0; i < this.trail.length; i++) {
      const t = this.trail[i], a = i / this.trail.length;
      ctx.globalAlpha = a * 0.32;
      const tg = ctx.createRadialGradient(t.x, t.y, 0, t.x, t.y, t.r * (0.5 + a * 0.6));
      tg.addColorStop(0, "rgba(150,230,255,.7)"); tg.addColorStop(1, "rgba(90,140,255,0)");
      ctx.fillStyle = tg; ctx.beginPath(); ctx.arc(t.x, t.y, t.r * (0.5 + a * 0.6), 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    // 縦長の「波の壁」グロー
    const wallG = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r * 2.4);
    wallG.addColorStop(0, "rgba(120,200,255,.5)"); wallG.addColorStop(1, "rgba(90,140,255,0)");
    ctx.fillStyle = wallG;
    ctx.beginPath(); ctx.ellipse(this.x, this.y, r * 1.5, r * 2.4, 0, 0, Math.PI * 2); ctx.fill();
    // 外殻オーラ
    const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r * 2.2);
    g.addColorStop(0, "rgba(255,255,255,1)");
    g.addColorStop(0.22, "rgba(170,240,255,.98)");
    g.addColorStop(0.55, "rgba(90,150,255,.65)");
    g.addColorStop(1, "rgba(90,140,255,0)");
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(this.x, this.y, r * 2.2, 0, Math.PI * 2); ctx.fill();
    // 回転する外周リング
    ctx.strokeStyle = "rgba(220,245,255,.85)"; ctx.lineWidth = Math.max(3, r * 0.06);
    ctx.beginPath(); ctx.ellipse(this.x, this.y, r * 1.25, r * 1.05, this.spin, 0, Math.PI * 2); ctx.stroke();
    // 白熱コア
    ctx.fillStyle = "#ffffff";
    ctx.beginPath(); ctx.arc(this.x, this.y, r * 0.55, 0, Math.PI * 2); ctx.fill();
    // 周回する火花
    ctx.fillStyle = "rgba(230,250,255,.95)";
    for (let k = 0; k < 7; k++) {
      const a0 = this.spin * 1.6 + k / 7 * Math.PI * 2;
      const rr = r * (1.0 + 0.18 * Math.sin(this.phase * 2 + k));
      ctx.beginPath(); ctx.arc(this.x + Math.cos(a0) * rr, this.y + Math.sin(a0) * rr, Math.max(2, r * 0.05), 0, Math.PI * 2); ctx.fill();
    }
    // 太い電撃アーク
    ctx.strokeStyle = "rgba(205,245,255,.95)"; ctx.lineWidth = Math.max(2.5, r * 0.05); ctx.lineCap = "round";
    for (let k = 0; k < 6; k++) {
      const a0 = this.phase * 1.3 + k * Math.PI / 3;
      ctx.beginPath();
      let px = this.x + Math.cos(a0) * r * 0.5, py = this.y + Math.sin(a0) * r * 0.5;
      ctx.moveTo(px, py);
      for (let s = 1; s <= 4; s++) {
        const rr = r * (0.8 + s * 0.45);
        const jit = Math.sin(this.phase * 7 + k * 3 + s) * r * 0.4;
        px = this.x + Math.cos(a0) * rr - Math.sin(a0) * jit;
        py = this.y + Math.sin(a0) * rr + Math.cos(a0) * jit;
        ctx.lineTo(px, py);
      }
      ctx.stroke();
    }
    ctx.restore();
  }
}

/* =====================================================================
   EFFECTS（パーティクル / リング）
   ===================================================================== */
function drawStar(ctx, cx, cy, spikes, outer, inner) {
  ctx.beginPath();
  for (let i = 0; i < spikes * 2; i++) {
    const r = i % 2 === 0 ? outer : inner;
    const a = i / (spikes * 2) * Math.PI * 2 - Math.PI / 2;
    const x = cx + Math.cos(a) * r, y = cy + Math.sin(a) * r;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath(); ctx.fill();
}

class Effects {
  constructor() { this.parts = []; this.rings = []; this.bursts = []; this.lines = []; this.texts = []; this.banners = []; }
  dmgNum(x, y, value, big) {
    this.texts.push({ x: x + (Math.random() - 0.5) * 16, y, vy: -150, value: Math.round(value), life: 0.85, max: 0.85, big });
  }
  // 画面中央のコール（FIRST ATTACK! / COUNTER! など）
  callout(text, color) {
    this.banners.push({ text, color: color || "#fff", x: W / 2, y: H * 0.30, vy: 0, life: 0.9, max: 0.9, size: 56, center: true });
  }
  // コンボ数の表示（キャラ頭上）
  combo(n, color, x, y) {
    this.banners.push({ text: n + " HITS", sub: true, color: color || "#ffd23d", x, y, vy: -46, life: 0.7, max: 0.7, size: 30 });
  }
  spark(x, y, dir, color, n) {
    for (let i = 0; i < n; i++) {
      const a = (Math.random() - 0.5) * 2.2 + (dir > 0 ? 0 : Math.PI);
      const sp = 120 + Math.random() * 320;
      this.parts.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 60, life: 0.3 + Math.random() * 0.3, max: 0.6, color, size: 2 + Math.random() * 3 });
    }
  }
  // 全方向に強く弾ける派手な火花（吹っ飛び用）
  blast(x, y, color, n, power) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = (200 + Math.random() * 600) * (power || 1);
      this.parts.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 120, life: 0.4 + Math.random() * 0.5, max: 0.9, color, size: 2 + Math.random() * 4 });
    }
  }
  ring(x, y, color) { this.rings.push({ x, y, r: 6, life: 0.25, max: 0.25, color, lw: 4 }); }
  shock(x, y, color) { this.rings.push({ x, y, r: 10, life: 0.4, max: 0.4, color, lw: 12 }); }
  // 多重衝撃波（太さ・寿命を変えて層に）
  megashock(x, y) {
    this.rings.push({ x, y, r: 14, life: 0.55, max: 0.55, color: "#ffffff", lw: 18, delay: 0 });
    this.rings.push({ x, y, r: 8, life: 0.6, max: 0.6, color: "#bfe8ff", lw: 10, delay: 0.06 });
    this.rings.push({ x, y, r: 6, life: 0.7, max: 0.7, color: "#7fd6ff", lw: 6, delay: 0.14 });
  }
  burst(x, y, color) { this.bursts.push({ x, y, r: 14, life: 0.3, max: 0.3, color: color || "#fff" }); }
  speedlines(x, y, color) { this.lines.push({ x, y, life: 0.28, max: 0.28, color: color || "#fff" }); }
  update(dt) {
    for (const p of this.parts) { p.vy += 900 * dt; p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt; }
    this.parts = this.parts.filter(p => p.life > 0);
    for (const r of this.rings) {
      if (r.delay > 0) { r.delay -= dt; continue; }   // 多重衝撃波の時間差
      r.r += (r.lw > 6 ? 700 : 380) * dt; r.life -= dt;
    }
    this.rings = this.rings.filter(r => r.life > 0);
    for (const b of this.bursts) { b.r += 1500 * dt; b.life -= dt; }
    this.bursts = this.bursts.filter(b => b.life > 0);
    for (const l of this.lines) l.life -= dt;
    this.lines = this.lines.filter(l => l.life > 0);
    for (const t of this.texts) { t.y += t.vy * dt; t.vy *= Math.pow(0.02, dt); t.life -= dt; }
    this.texts = this.texts.filter(t => t.life > 0);
    for (const b of this.banners) { b.y += b.vy * dt; b.vy *= Math.pow(0.1, dt); b.life -= dt; }
    this.banners = this.banners.filter(b => b.life > 0);
  }
  draw(ctx) {
    // 集中線
    for (const l of this.lines) {
      const a = Math.max(0, l.life / l.max); ctx.save(); ctx.globalAlpha = a * 0.85;
      ctx.strokeStyle = l.color; ctx.lineWidth = 4; ctx.lineCap = "round";
      for (let i = 0; i < 18; i++) {
        const ang = i / 18 * Math.PI * 2 + (1 - a);
        const r1 = 50 + (1 - a) * 140, r2 = r1 + 70 + a * 90;
        ctx.beginPath();
        ctx.moveTo(l.x + Math.cos(ang) * r1, l.y + Math.sin(ang) * r1);
        ctx.lineTo(l.x + Math.cos(ang) * r2, l.y + Math.sin(ang) * r2);
        ctx.stroke();
      }
      ctx.restore();
    }
    // リング/衝撃波
    for (const r of this.rings) {
      ctx.save(); ctx.globalAlpha = Math.max(0, r.life / r.max);
      ctx.strokeStyle = r.color; ctx.lineWidth = r.lw;
      ctx.beginPath(); ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2); ctx.stroke();
      ctx.restore();
    }
    // 衝撃スター（バーン）
    for (const b of this.bursts) {
      const a = Math.max(0, b.life / b.max); ctx.save(); ctx.globalAlpha = a;
      const g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r * 1.6);
      g.addColorStop(0, b.color); g.addColorStop(0.4, b.color); g.addColorStop(1, "rgba(255,255,255,0)");
      ctx.fillStyle = g; drawStar(ctx, b.x, b.y, 12, b.r * 1.6, b.r * 0.7);
      ctx.fillStyle = "#fff"; drawStar(ctx, b.x, b.y, 10, b.r, b.r * 0.45);
      ctx.restore();
    }
    // 火花
    for (const p of this.parts) {
      ctx.save(); ctx.globalAlpha = Math.max(0, p.life / p.max);
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }
    // ダメージ数字
    for (const t of this.texts) {
      const a = Math.max(0, t.life / t.max);
      const sz = (t.big ? 38 : 26) * (a > 0.7 ? 1 + (a - 0.7) * 1.5 : 1); // 出現時に少し大きく
      ctx.save(); ctx.globalAlpha = Math.min(1, a * 1.6);
      ctx.font = "900 " + sz.toFixed(0) + "px system-ui"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.lineWidth = 5; ctx.strokeStyle = "#2a0d0d"; ctx.strokeText(t.value, t.x, t.y);
      ctx.fillStyle = t.big ? "#ffd23d" : "#fff";
      ctx.fillText(t.value, t.x, t.y);
      ctx.restore();
    }
    // コール / コンボ表示
    for (const b of this.banners) {
      const a = Math.max(0, b.life / b.max);
      const pop = a > 0.75 ? 1 + (a - 0.75) * 2 : 1;       // 出現時に弾む
      const sz = b.size * pop;
      ctx.save();
      ctx.globalAlpha = Math.min(1, a * 1.8);
      ctx.font = "900 " + sz.toFixed(0) + "px system-ui";
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.lineWidth = b.center ? 8 : 6; ctx.strokeStyle = "#15080a"; ctx.lineJoin = "round";
      ctx.strokeText(b.text, b.x, b.y);
      ctx.fillStyle = b.color; ctx.fillText(b.text, b.x, b.y);
      ctx.restore();
    }
  }
}

/* =====================================================================
   BACKGROUND（パララックス・ステージ）
   ===================================================================== */
const Stage = (() => {
  const rnd = (a, b) => a + Math.random() * (b - a);
  const SKY_Y = H * 0.6;                     // ビルが立つ地平線
  // 崩れたビル1棟ぶんのプロファイルを生成
  function makeBuilding(w, h) {
    const top = [];                          // 崩れたギザギザの屋根
    const segs = 3 + (w / 24 | 0);
    let y = rnd(0, h * 0.12);
    for (let i = 0; i <= segs; i++) {
      if (Math.random() < 0.42) y = rnd(0, h * 0.42);   // 大きく欠ける
      else y = Math.max(0, Math.min(h * 0.45, y + rnd(-8, 8)));
      top.push(y);
    }
    const win = [];                          // 数少ない・割れた窓（一部に灯り）
    for (let cx = 7; cx < w - 9; cx += 13) {
      for (let cy = h * 0.46; cy < h - 10; cy += 18) {
        if (Math.random() < 0.5) continue;
        win.push({ x: cx, y: cy, lit: Math.random() < 0.32, ph: Math.random() * 9 });
      }
    }
    return { w, h, top, win };
  }
  function makeLayer(n, hmin, hmax, gmin, gmax) {
    const items = []; let span = 0;
    for (let i = 0; i < n; i++) {
      const w = rnd(55, 120), h = rnd(hmin, hmax);
      items.push({ x: span, b: makeBuilding(w, h) });
      span += w + rnd(gmin, gmax);
    }
    return { items, span };
  }
  const farL = makeLayer(18, 70, 170, 10, 34);
  const midL = makeLayer(13, 120, 280, 26, 80);
  const stars = [];
  for (let i = 0; i < 60; i++) stars.push({ x: Math.random() * W, y: Math.random() * (H * 0.42), s: Math.random() * 1.4 });
  const smoke = [];                          // 立ち上る煙
  for (let i = 0; i < 5; i++) smoke.push({ x: Math.random() * W, base: SKY_Y - rnd(20, 160), ph: Math.random() * 9, w: rnd(26, 50) });
  const ash = [];                            // 舞う灰・火の粉
  for (let i = 0; i < 50; i++) ash.push({ x: Math.random() * W, y: Math.random() * H, sp: 5 + Math.random() * 14, sw: 12 + Math.random() * 46, ph: Math.random() * 9, r: 1 + Math.random() * 1.8, ember: Math.random() < 0.22 });
  const debris = [];                         // 路上のがれき
  for (let i = 0; i < 30; i++) debris.push({ x: Math.random() * (W + 200), y: GROUND_Y + rnd(8, 80), w: 8 + Math.random() * 34, h: 4 + Math.random() * 14, t: Math.random() });

  function building(x, b, fill, winCol, t) {
    const topY = SKY_Y - b.h, n = b.top.length;
    ctx.fillStyle = fill;
    ctx.beginPath();
    ctx.moveTo(x, SKY_Y);
    ctx.lineTo(x, topY + b.top[0]);
    for (let i = 0; i < n; i++) ctx.lineTo(x + b.w * (i / (n - 1)), topY + b.top[i]);
    ctx.lineTo(x + b.w, SKY_Y);
    ctx.closePath(); ctx.fill();
    if (!winCol) return;
    for (const w of b.win) {
      if (w.lit) {
        const a = 0.35 + 0.4 * Math.abs(Math.sin(t * 2.3 + w.ph));
        ctx.fillStyle = "rgba(255,168,74," + a.toFixed(2) + ")";
      } else ctx.fillStyle = "rgba(0,0,0,0.4)";
      ctx.fillRect(x + w.x, topY + w.y, 5, 7);
    }
  }
  function layer(L, par, fill, winCol, t, camX) {
    const passes = Math.ceil((W + 40) / L.span) + 1;
    const off = -(((camX * par) % L.span) + L.span) % L.span;
    for (let p = 0; p < passes; p++) {
      const base = off + p * L.span;
      for (const it of L.items) {
        const bx = base + it.x;
        if (bx > W + 10 || bx + it.b.w < -10) continue;
        building(bx, it.b, fill, winCol, t);
      }
    }
  }

  function draw(ctx2, t, camX) {
    // 空（煤けた夜空）
    const sky = ctx.createLinearGradient(0, 0, 0, SKY_Y + 40);
    sky.addColorStop(0, "#070810"); sky.addColorStop(0.45, "#15121c");
    sky.addColorStop(0.78, "#2a1d24"); sky.addColorStop(1, "#3c2620");
    ctx.fillStyle = sky; ctx.fillRect(0, 0, W, SKY_Y + 40);
    // 地平の遠火の赤い照り返し
    const fireGlow = ctx.createLinearGradient(0, SKY_Y - 150, 0, SKY_Y);
    fireGlow.addColorStop(0, "rgba(180,60,30,0)");
    fireGlow.addColorStop(1, "rgba(190,70,32,0.28)");
    ctx.fillStyle = fireGlow; ctx.fillRect(0, SKY_Y - 150, W, 150);
    // 星（うっすら）
    ctx.fillStyle = "#aeb6d0";
    for (const s of stars) { ctx.globalAlpha = 0.18 + 0.32 * Math.abs(Math.sin(t + s.x)); ctx.fillRect((s.x - camX * 0.08 % W + W) % W, s.y, s.s, s.s); }
    ctx.globalAlpha = 1;
    // 霞んだ月
    const mx = (W * 0.78 - camX * 0.08 % W + W) % W;
    const mg = ctx.createRadialGradient(mx, 150, 8, mx, 150, 110);
    mg.addColorStop(0, "rgba(220,200,180,.5)"); mg.addColorStop(1, "rgba(180,150,120,0)");
    ctx.fillStyle = mg; ctx.beginPath(); ctx.arc(mx, 150, 110, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#d9cdba"; ctx.beginPath(); ctx.arc(mx, 150, 42, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "rgba(40,30,28,.35)"; ctx.beginPath(); ctx.arc(mx + 12, 142, 12, 0, Math.PI * 2); ctx.fill();
    // 流れる煤煙の雲
    ctx.fillStyle = "rgba(20,14,16,0.5)";
    for (let i = 0; i < 5; i++) {
      const cx = ((i * 320 - camX * 0.06 + t * 6) % (W + 300) + W + 300) % (W + 300) - 150;
      ctx.beginPath(); ctx.ellipse(cx, 60 + i * 26, 180, 34, 0, 0, Math.PI * 2); ctx.fill();
    }
    // 遠景ビル（霞む）→ 近景ビル（灯りつき）
    layer(farL, 0.12, "#14111b", null, t, camX);
    ctx.fillStyle = "rgba(60,38,34,0.22)"; ctx.fillRect(0, SKY_Y - 200, W, 200); // 大気遠近
    layer(midL, 0.26, "#0b0910", "lit", t, camX);
    // 立ち上る煙
    for (const s of smoke) {
      const sx = (s.x - camX * 0.26 % W + W) % W;
      for (let k = 0; k < 7; k++) {
        const yy = s.base - k * 26 - (t * 14 % 26);
        const drift = Math.sin(t * 0.5 + s.ph + k * 0.6) * (8 + k * 3);
        ctx.globalAlpha = Math.max(0, 0.22 - k * 0.03);
        ctx.fillStyle = "#1c1418";
        ctx.beginPath(); ctx.ellipse(sx + drift, yy, s.w * 0.5 + k * 3, s.w * 0.34 + k * 2, 0, 0, Math.PI * 2); ctx.fill();
      }
    }
    ctx.globalAlpha = 1;

    // 中景：瓦礫の丘・荒地
    const lotG = ctx.createLinearGradient(0, SKY_Y - 4, 0, GROUND_Y);
    lotG.addColorStop(0, "#0a0810"); lotG.addColorStop(1, "#161019");
    ctx.fillStyle = lotG; ctx.fillRect(0, SKY_Y - 4, W, GROUND_Y - SKY_Y + 6);
    ctx.fillStyle = "#0d0a12";
    for (let i = 0; i < 11; i++) {
      const rx = (i * 150 - camX * 0.34 % 150 + W + 150) % (W + 150) - 75;
      const ry = SKY_Y + 6 + (i * 37 % 40);
      ctx.beginPath();
      ctx.moveTo(rx - 50, GROUND_Y); ctx.lineTo(rx - 20, ry); ctx.lineTo(rx + 8, ry + 14);
      ctx.lineTo(rx + 30, ry - 6); ctx.lineTo(rx + 64, GROUND_Y); ctx.closePath(); ctx.fill();
    }
    // シルエットの目印（枯木・傾いた電柱・廃車）
    prop("tree", 0.4, 0.16, camX);
    prop("pole", 0.4, 0.62, camX);
    prop("car", 0.46, 0.86, camX);

    // 路面（ひび割れたアスファルト）
    const fy = GROUND_Y;
    const fg = ctx.createLinearGradient(0, fy - 6, 0, H);
    fg.addColorStop(0, "#2b2630"); fg.addColorStop(0.5, "#1b1820"); fg.addColorStop(1, "#0c0a10");
    ctx.fillStyle = fg; ctx.fillRect(0, fy - 6, W, H - fy + 6);
    // 縁石ハイライト
    ctx.strokeStyle = "rgba(120,100,90,.18)"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, fy - 4); ctx.lineTo(W, fy - 4); ctx.stroke();
    // ひび割れ
    ctx.strokeStyle = "rgba(0,0,0,.5)"; ctx.lineWidth = 2;
    for (let i = 0; i < 7; i++) {
      const cx = (i * 200 - camX * 0.6 % 200 + W + 200) % (W + 200) - 100;
      ctx.beginPath(); ctx.moveTo(cx, fy);
      ctx.lineTo(cx + 26, fy + 34); ctx.lineTo(cx - 14, fy + 70); ctx.lineTo(cx + 40, H);
      ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx + 26, fy + 34); ctx.lineTo(cx + 70, fy + 50); ctx.stroke();
    }
    // 路上のがれき
    for (const d of debris) {
      const dx = (d.x - camX * 0.6 % (W + 200) + W + 200) % (W + 200) - 100;
      ctx.fillStyle = d.t < 0.5 ? "#23202b" : "#181520";
      ctx.beginPath();
      ctx.moveTo(dx, d.y); ctx.lineTo(dx + d.w * 0.4, d.y - d.h); ctx.lineTo(dx + d.w, d.y - d.h * 0.4);
      ctx.lineTo(dx + d.w * 0.7, d.y); ctx.closePath(); ctx.fill();
    }

    // 舞う灰・火の粉（最前面）
    for (const a of ash) {
      const ay = (a.y + t * a.sp) % (H + 20);
      const ax = ((a.x + Math.sin(t * 0.4 + a.ph) * a.sw - camX * 0.3) % W + W) % W;
      if (a.ember) { ctx.fillStyle = "rgba(255,150,60," + (0.5 + 0.4 * Math.sin(t * 4 + a.ph)).toFixed(2) + ")"; }
      else { ctx.globalAlpha = 0.35; ctx.fillStyle = "#8a8290"; }
      ctx.beginPath(); ctx.arc(ax, ay, a.r, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
    }
    // 全体の薄暗いビネット
    const vg = ctx.createRadialGradient(W / 2, H * 0.55, H * 0.3, W / 2, H * 0.55, H * 0.85);
    vg.addColorStop(0, "rgba(0,0,0,0)"); vg.addColorStop(1, "rgba(0,0,0,0.5)");
    ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);
  }

  // 中景の目印シルエット（枯木 / 電柱 / 廃車）
  function prop(kind, par, frac, camX) {
    const span = W + 360;
    const x = ((frac * span - camX * par) % span + span) % span - 180;
    const gy = GROUND_Y;
    ctx.save();
    ctx.fillStyle = "#08060c"; ctx.strokeStyle = "#08060c";
    if (kind === "tree") {
