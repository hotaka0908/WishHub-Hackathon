<!DOCTYPE html>
<!-- VIBE FIGHT 紹介スライド / QRコード付き (rev2) -->
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VIBE FIGHT — 紹介スライド</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Russo+One&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
<style>
  :root{ --cyan:#4aa6ff; --mag:#ff4fc8; --gold:#ffd23d; --emerald:#33e6a0; --paper:#e9eefb; }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:radial-gradient(circle at 50% 22%, #161a33 0%, #07060d 62%, #050409 100%);
    color:var(--paper); font-family:"Noto Sans JP",system-ui,sans-serif; overflow:hidden; user-select:none;
  }
  #stage{position:fixed; inset:0; display:flex; align-items:center; justify-content:center;}
  .slide{position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center;
    padding:7vmin; text-align:center; gap:4vmin; opacity:0; transform:translateY(18px); transition:opacity .45s, transform .45s;}
  .slide.on{display:flex; opacity:1; transform:none;}
  .scan{position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(255,255,255,.03) 0 1px,transparent 1px 3px);mix-blend-mode:overlay;}
  .glowbar{height:5px;width:42vmin;border-radius:99px;background:linear-gradient(90deg,var(--cyan),var(--mag));box-shadow:0 0 24px rgba(90,160,255,.7);}
  .kicker{font-family:"Russo One";letter-spacing:.4em;font-size:2.2vmin;color:#9fb4e0;text-transform:uppercase;}
  .logo{font-family:"Black Ops One",sans-serif;font-size:16vmin;line-height:1;transform:skewX(-7deg);
    background:linear-gradient(180deg,#fff 0%,#bdf0ff 26%,#4aa6ff 54%,#7b6bff 78%,#ff4fc8 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 38px rgba(90,160,255,.45); filter:drop-shadow(6px 7px 0 rgba(11,7,22,.85));}
  h2{font-family:"Black Ops One",sans-serif;font-size:7.5vmin;line-height:1.05;transform:skewX(-6deg);
    background:linear-gradient(180deg,#fff,#bdf0ff 45%,var(--cyan));
    -webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(4px 5px 0 rgba(11,7,22,.8));}
  .lead{font-size:3.4vmin;color:#dbe5ff;font-weight:700;}
  /* 手順（スライド2） */
  .steps{display:flex;flex-direction:column;gap:3.4vmin;width:min(90vmin,92%);}
  .step{display:flex;align-items:center;gap:3.5vmin;}
  .step .k{font-family:"Russo One";font-size:4.6vmin;min-width:26vmin;text-align:right;color:#fff;}
  .step .arrow{font-size:4vmin;color:var(--cyan);}
  .step .v{font-size:4vmin;font-weight:900;text-align:left;}
  /* 特徴カード（スライド3） */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:3.4vmin;width:min(96vmin,92%);}
  .card{background:linear-gradient(160deg,rgba(40,52,92,.5),rgba(16,18,34,.5));
    border:1px solid rgba(120,160,255,.22);border-radius:18px;padding:4vmin 3vmin;
    display:flex;flex-direction:column;align-items:center;gap:1.6vmin;}
  .card .ic{font-size:7vmin;filter:drop-shadow(0 0 10px rgba(90,160,255,.6));}
  .card .lbl{font-family:"Russo One";font-size:3vmin;color:#fff;}
  /* 遊ぶ（スライド4） */
  .pill{display:inline-block;font-family:"Russo One";font-size:2.8vmin;padding:.6em 1.4em;border-radius:99px;margin:1vmin;
    border:1px solid rgba(120,170,255,.4);color:#cfe0ff;background:rgba(60,90,170,.18);}
  .big-url{font-family:"Russo One";font-size:4.4vmin;color:var(--gold);text-shadow:0 0 26px rgba(255,210,60,.55);}
  .qr{background:#fff;padding:2.2vmin;border-radius:16px;box-shadow:0 0 44px rgba(90,160,255,.4);line-height:0;}
  .qr img{width:33vmin;height:33vmin;display:block;image-rendering:pixelated;}
  .qrcap{font-size:2vmin;color:#9fb4e0;font-family:"Russo One";}
  .cy{color:var(--cyan);} .mag{color:var(--mag);} .gd{color:var(--gold);} .win{color:var(--emerald);}
  footer{position:fixed;left:0;right:0;bottom:2.4vmin;display:flex;align-items:center;justify-content:space-between;
    padding:0 4vmin;font-size:1.7vmin;color:#6c79a8;font-family:"Russo One";}
  .dots{display:flex;gap:1.2vmin;}
  .dot{width:1.5vmin;height:1.5vmin;border-radius:99px;background:rgba(160,180,230,.25);transition:.3s;}
  .dot.on{background:linear-gradient(90deg,var(--cyan),var(--mag));box-shadow:0 0 12px rgba(120,160,255,.8);transform:scale(1.15);}
  .num{font-size:2.1vmin;color:#fff;font-weight:900;}
</style>
</head>
<body>
<div class="scan"></div>
<div id="stage">

  <!-- 1. タイトル -->
  <section class="slide">
    <div class="kicker">Browser Fighting Game</div>
    <div class="logo">VIBE&nbsp;FIGHT</div>
    <div class="glowbar"></div>
    <div class="lead">連打で殴り合う、爽快 2D 格闘</div>
  </section>

  <!-- 2. 遊び方 -->
  <section class="slide">
    <div class="kicker">How to Play</div>
    <div class="steps">
      <div class="step"><div class="k cy">← →</div><div class="arrow">▶</div><div class="v">移動</div></div>
      <div class="step"><div class="k gd">A〜Z 連打</div><div class="arrow">▶</div><div class="v">攻撃</div></div>
      <div class="step"><div class="k mag">ゲージMAX</div><div class="arrow">▶</div><div class="v">必殺技！</div></div>
    </div>
  </section>

  <!-- 3. 見どころ -->
  <section class="slide">
    <div class="kicker">Highlights</div>
    <h2>見どころ</h2>
    <div class="grid">
      <div class="card"><div class="ic">🌃</div><div class="lbl">荒廃した街</div></div>
      <div class="card"><div class="ic">🥋</div><div class="lbl">ぬるぬる動く</div></div>
      <div class="card"><div class="ic">💥</div><div class="lbl">爽快エフェクト</div></div>
      <div class="card"><div class="ic">🔊</div><div class="lbl">全部コード生成の音</div></div>
    </div>
  </section>

  <!-- 4. 遊ぶ -->
  <section class="slide">
    <div class="kicker">Play Now</div>
    <h2>今すぐ遊ぶ</h2>
    <div class="qr" id="qr"></div>
    <div class="qrcap">スマホで読み取ってプレイ 📱</div>
    <div class="big-url">neon-fist.vercel.app</div>
  </section>

</div>

<footer>
  <div>VIBE FIGHT</div>
  <div class="dots" id="dots"></div>
  <div><span id="page" class="num">1</span> / 4</div>
</footer>

<script>
  const slides = [...document.querySelectorAll(".slide")];
  const dotsWrap = document.getElementById("dots");
  const pageEl = document.getElementById("page");
  let i = 0;
  slides.forEach((_, k) => { const d = document.createElement("div"); d.className = "dot"; d.onclick = () => go(k); dotsWrap.appendChild(d); });
  const dots = [...document.querySelectorAll(".dot")];
  function go(n){ i = Math.max(0, Math.min(slides.length-1, n));
    slides.forEach((s,k)=>s.classList.toggle("on",k===i));
    dots.forEach((d,k)=>d.classList.toggle("on",k===i));
    pageEl.textContent = i+1; }
  function next(d){ go(i+d); }
  window.addEventListener("keydown",(e)=>{
    if(e.key==="ArrowRight"||e.key===" "||e.key==="Enter"){next(1);e.preventDefault();}
    else if(e.key==="ArrowLeft"){next(-1);e.preventDefault();}
    else if(e.key==="Home")go(0); else if(e.key==="End")go(slides.length-1);
  });
  window.addEventListener("click",(e)=>{ if(!e.target.closest(".dots")) next(1); });

  // 対戦ゲームへ飛ぶ QR コードを生成
  const PLAY_URL = "https://neon-fist.vercel.app/";
  (function makeQR(){
    const el = document.getElementById("qr");
    try {
      if (typeof qrcode !== "function") throw new Error("lib missing");
      const qr = qrcode(0, "M"); qr.addData(PLAY_URL); qr.make();
      el.innerHTML = '<img alt="QRコード" src="' + qr.createDataURL(10, 2) + '">';
    } catch (e) {
      // ライブラリ未読込時は画像APIにフォールバック
      el.innerHTML = '<img alt="QRコード" '
        + 'src="https://api.qrserver.com/v1/create-qr-code/?size=400x400&margin=8&data='
        + encodeURIComponent(PLAY_URL) + '">';
    }
  })();

  go(0);
</script>
</body>
</html>
