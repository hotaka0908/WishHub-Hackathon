      ctx.lineCap = "round"; ctx.lineWidth = 9;
      ctx.beginPath(); ctx.moveTo(x, gy); ctx.lineTo(x - 6, gy - 120); ctx.stroke();
      ctx.lineWidth = 5;
      const br = [[-6, -120, -38, -150], [-6, -96, 26, -134], [-6, -70, -30, -92], [-6, -110, 8, -150]];
      for (const b of br) { ctx.beginPath(); ctx.moveTo(x + b[0], gy + b[1]); ctx.lineTo(x + b[2], gy + b[3]); ctx.stroke(); }
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(x - 38, gy - 150); ctx.lineTo(x - 54, gy - 168); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x + 26, gy - 134); ctx.lineTo(x + 44, gy - 150); ctx.stroke();
    } else if (kind === "pole") {
      ctx.save(); ctx.translate(x, gy); ctx.rotate(0.12);
      ctx.fillRect(-4, -190, 8, 190);
      ctx.fillRect(-44, -190, 88, 9);            // 腕木
      ctx.restore();
      ctx.strokeStyle = "rgba(8,6,12,.7)"; ctx.lineWidth = 2; // たれ下がる電線
      ctx.beginPath(); ctx.moveTo(x - 40, gy - 184); ctx.quadraticCurveTo(x - 120, gy - 120, x - 200, gy - 150); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x + 40, gy - 184); ctx.quadraticCurveTo(x + 130, gy - 110, x + 220, gy - 140); ctx.stroke();
    } else if (kind === "car") {
      ctx.beginPath();
      ctx.moveTo(x - 64, gy); ctx.lineTo(x - 58, gy - 30); ctx.lineTo(x - 30, gy - 44);
      ctx.lineTo(x + 18, gy - 46); ctx.lineTo(x + 40, gy - 24); ctx.lineTo(x + 66, gy - 20);
      ctx.lineTo(x + 64, gy); ctx.closePath(); ctx.fill();          // 潰れたボディ
      ctx.fillStyle = "#0c0a12";
      ctx.beginPath(); ctx.arc(x - 38, gy, 13, 0, Math.PI); ctx.fill(); // タイヤ跡
      ctx.beginPath(); ctx.arc(x + 40, gy, 13, 0, Math.PI); ctx.fill();
    }
    ctx.restore();
  }
  return { draw };
})();

/* =====================================================================
   GAME
   ===================================================================== */
class Game {
  constructor() {
    this.fx = new Effects();
    this.projectiles = [];
    this.p1 = new Fighter({ name: "あなた", x: W * 0.32, facing: 1,
      build: { limbW: 0.84, torsoW: 0.9, headR: 14, hair: "spike" },   // 細身スピード型・ポニーテール
      colors: {
      skin: "#f0b58a", cloth: "#3da6ff", cloth2: "#2b6fd6", shoe: "#1a2740", hair: "#23314f", band: "#ff4d6d", belt: "#10204a" } });
    this.p2 = new Fighter({ name: "CPU", x: W * 0.68, facing: -1, isCPU: true,
      build: { limbW: 1.24, torsoW: 1.2, headR: 16, hair: "mohawk", beard: true }, // がっしりパワー型・モヒカン
      colors: {
      skin: "#e7a878", cloth: "#ff5a5a", cloth2: "#c23030", shoe: "#2a1414", hair: "#1c1c1c", band: "#ffd23d", belt: "#3a0d0d" } });
    this.ai = { timer: 0, action: "idle", moveDir: 0, level: 1 };
    this.mode = "cpu";           // cpu = 対CPU / vs = ローカル2人 / vs+online = オンライン
    this.menuIndex = 0;          // タイトルの選択（0=CPU / 1=オンライン）
    this.online = false;         // オンライン対戦中か
    this.netRole = null;         // 'host'(=1P) / 'guest'(=2P)
    this._oi1 = { move: 0, attack: false };  // オンライン適用入力（P1/P2）
    this._oi2 = { move: 0, attack: false };
    this.state = "title";        // title / ready / fight / roundEnd / matchEnd
    this.wins = [0, 0];
    this.round = 1;
    this.banner = ""; this.bannerT = 0;
    this.timer = 60;
    this.hitstop = 0; this.shake = 0; this.slow = 0; this.slowFactor = 0.35;
    this.flash = 0; this.flashMax = 1; this.flashColor = "#ffffff";
    this.cine = 0; this.cineMax = 1; this.cineAmt = 0.34; this.zoomFocus = { x: W / 2, y: H / 2 }; // シネマズーム
    this.t = 0;
    this.koTarget = null;
    this.firstHit = false;
  }
  // 手応えのコール / コンボ表示
  showCallout(text, color) { this.fx.callout(text, color); }
  showCombo(n, atkIdx, x, y) {
    const col = atkIdx === 0 ? this.p1.colors.cloth : this.p2.colors.cloth;
    this.fx.combo(n, col, x, y);
  }
  startMatch() {
    this.wins = [0, 0]; this.round = 1;
    Input.setMode(this.online ? "online" : this.mode);
    // モードに応じてP2をCPU/人間に、名前も切替
    this.p2.isCPU = (this.mode === "cpu");
    if (this.online) {
      // ホスト=1P(左)/ゲスト=2P(右)。各画面で自分側に「あなた」
      this.p1.name = this.netRole === "host" ? "あなた" : "あいて";
      this.p2.name = this.netRole === "guest" ? "あなた" : "あいて";
    } else {
      this.p1.name = (this.mode === "cpu") ? "あなた" : "1P";
      this.p2.name = (this.mode === "cpu") ? "CPU" : "2P";
    }
    this.p1.comboIndex = 0; this.p2.comboIndex = 0;  // 新しい試合のみ攻撃ループを最初から
    Audio_.startBGM();
    this.startRound();
  }
  // オンライン対戦の開始（Net から呼ばれる。両者で同時に同じ初期状態へ）
  startOnline(role) {
    this.online = true; this.netRole = role; this.mode = "vs";
    this.startMatch();
  }
  // オンライン対戦の終了 → タイトルへ
  endOnline() {
    this.online = false; this.netRole = null;
    this.state = "title"; this.menuIndex = 1;
    Audio_.stopBGM();
  }
  // Net が各フレーム適用する入力（P1=host側 / P2=guest側）
  setOnlineInputs(in1, in2) { this._oi1 = in1; this._oi2 = in2; }
  // 明示入力を両ファイターへ反映（オンライン用）
  applyInputs(in1, in2) {
    this.p1.walk(in1.move, this.p2);
    if (in1.attack) this.p1.request("normal");
    this.p2.walk(in2.move, this.p1);
    if (in2.attack) this.p2.request("normal");
  }
  // タイトルメニューの決定
  confirmMenu() {
    if (this.menuIndex === 0) { this.mode = "cpu"; this.online = false; this.startMatch(); }
    else { this.online = true; openLobby(); }   // オンライン：ロビーを開く
  }
  startRound() {
    this.p1.reset(1); this.p2.reset(-1);
    this.projectiles.length = 0; this.fx.parts.length = 0; this.fx.rings.length = 0;
    this.fx.banners.length = 0; this.fx.texts.length = 0; this.firstHit = false;
    this.timer = 60; this.koTarget = null;
    this.state = "ready"; this.banner = "ROUND " + this.round; this.bannerT = 1.4;
    Audio_.round();
  }
  spawnProjectile(owner) { this.projectiles.push(new Projectile(owner, this)); Audio_.fire(); }
  // スロー演出（残り時間と倍率を指定。倍率が小さいほど遅い）
  setSlow(dur, factor) { if (dur > this.slow) this.slow = dur; this.slowFactor = Math.min(this.slowFactor, factor); }
  // 衝撃点へのシネマズーム（dur 秒かけて戻る。amt=ズーム量、省略時0.34）
  cineZoom(dur, x, y, amt) { this.cine = dur; this.cineMax = dur; this.zoomFocus = { x, y }; this.cineAmt = (amt == null ? 0.34 : amt); }
  onKO(loser) {
    if (this.state !== "fight") return;
    this.koTarget = loser;
    const winnerIdx = loser === this.p1 ? 1 : 0;
    this.wins[winnerIdx]++;
    this.state = "roundEnd";
    const wname = winnerIdx === 0 ? this.p1.name : this.p2.name;
    this.banner = wname + " の勝ち！";
    this.bannerT = 2.6;
    this.slow = 1.2;
  }

  /* ---- AI ---- */
  updateAI(dt) {
    const me = this.p2, you = this.p1;
    const a = this.ai;
    a.timer -= dt;
    const dist = Math.abs(you.x - me.x);
    const toYou = Math.sign(you.x - me.x) || 1;

    // 反応ガード：相手が近距離で攻撃中なら高確率でガード
    if (you.state === "attack" && dist < 170 && me.canAct()) {
      if (Math.random() < 0.12) { a.action = "block"; a.moveDir = -toYou; a.timer = 0.18; }
    }
    // 飛び道具を避ける/ガード
    for (const pr of this.projectiles) {
      if (pr.owner === me) continue;
      if (Math.sign(pr.vx) === toYou * -1 && Math.abs(pr.x - me.x) < 260) {
        if (Math.random() < 0.06) { a.action = "block"; a.moveDir = -toYou; a.timer = 0.2; }
      }
    }

    // 通常技だけで戦う（必殺技はゲージ満タンで自動発動＝プレイヤーと同条件）
    if (a.timer <= 0) {
      a.timer = 0.18 + Math.random() * 0.35;
      if (dist > 320) { a.action = "approach"; a.moveDir = toYou; }
      else if (dist > 150) {
        const r = Math.random();
        if (r < 0.6) { a.action = "approach"; a.moveDir = toYou; }
        else { a.action = "wait"; a.moveDir = (Math.random() < 0.5 ? -toYou : 0); }
      } else {
        const r = Math.random();
        if (r < 0.72) a.action = "normal";
        else { a.action = "block"; a.moveDir = -toYou; a.timer = 0.25; }
      }
    }

    // 実行
    if (a.action === "approach" || a.action === "wait" || a.action === "block") {
      me.walk(a.moveDir || 0, you);
    } else if (me.canAct()) {
      const g = Math.floor(Math.random() * 5);
      if (a.action === "normal") me.request("normal", g);
      a.action = "wait"; a.moveDir = 0; a.timer = 0.4 + Math.random() * 0.3;
    }
  }

  /* ---- 衝突判定 ---- */
  overlap(a, b) { return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }
  checkCombat() {
    const pair = [[this.p1, this.p2], [this.p2, this.p1]];
    for (const [atk, def] of pair) {
      if (atk.state === "attack" && atk.attack && !atk.hasHit) {
        const rb = atk.getReachBox();
        if (rb && this.overlap(rb, def.hurtBox())) {
          atk.hasHit = true;
          atk.meter = Math.min(MAX_METER, atk.meter + rb.move.meter);
          def.takeHit(rb.move, atk.facing, this);
        }
      }
    }
    // 飛び道具（貫通：敵を突き抜けて飛び続ける）
    for (const pr of this.projectiles) {
      if (pr.dead) continue;
      const def = pr.owner === this.p1 ? this.p2 : this.p1;
      const hitting = this.overlap(pr.box(), def.hurtBox());
      if (!pr.hasHit && hitting) {
        pr.hasHit = true;               // ダメージは1回のみ（dead にしない＝貫通）
        pr.pierced = true; pr.vx *= 1.3; // 突き抜けて加速
        def.takeHit({ dmg: ULTIMATE.dmg, kb: 760, up: -260, projectile: true }, pr.dir, this);
        this.fx.megashock(pr.x, pr.y);
        this.fx.spark(pr.x, pr.y, pr.dir, "#aee6ff", 50);
      } else if (pr.hasHit && hitting) {
        // 貫通中：波に押し込まれて一緒に運ばれる＋火花
        def.vx += pr.dir * 1400 / 60;
        if (Math.random() < 0.6) this.fx.spark(def.x, def.y - 110 + def.airY, pr.dir, "#cfeaff", 4);
      }
    }
    // 体の押し合い（吹っ飛び/ダウン中は押し合わない）
    const grounded = (f) => f.state !== "knockdown" && f.state !== "ko";
    const d = this.p2.x - this.p1.x;
    if (Math.abs(d) < 56 && grounded(this.p1) && grounded(this.p2)) {
      const push = (56 - Math.abs(d)) / 2 * (d >= 0 ? 1 : -1);
      this.p1.x -= push * 0.5; this.p2.x += push * 0.5;
      this.p1.x = Math.max(FLOOR_MIN, Math.min(FLOOR_MAX, this.p1.x));
      this.p2.x = Math.max(FLOOR_MIN, Math.min(FLOOR_MAX, this.p2.x));
    }
  }

  update(dt) {
    this.t += dt;
    Input.update();

    // タイトル：↑↓でモード選択 / 1・2・3で直接選択 / Enterで決定
    if (this.state === "title") {
      const nav = Input.consumeNav();
      if (nav) this.menuIndex = (this.menuIndex + nav + 2) % 2;
      const d = Input.consumeDigit();
      if (d >= 0) { this.menuIndex = d; this.confirmMenu(); return; }
      if (Input.consumeEnter()) { this.confirmMenu(); }
      return;
    }
    if (this.state === "matchEnd") {
      this.bannerT -= dt;
      // オンラインは DOM の「もう一度/退出」で進める（Enterは無効）
      if (!this.online && Input.consumeEnter()) { this.state = "title"; Audio_.stopBGM(); }
      return;
    }

    // シネマズームの減衰（演出中も進める）
    if (this.cine > 0) this.cine -= dt;
    // ヒットストップ（この間フラッシュは保持＝バーンが一瞬止まる）
    if (this.hitstop > 0) { this.hitstop -= dt; this.fx.update(dt * 0.15); return; }
    // スローモー（slowFactor が小さいほど深いスロー）
    let sdt = dt;
    if (this.slow > 0) { this.slow -= dt; sdt = dt * this.slowFactor; if (this.slow <= 0) this.slowFactor = 0.35; }
    if (this.flash > 0) this.flash -= dt;

    if (this.state === "ready") {
      this.bannerT -= dt;
      // 立ち姿だけ更新
      this.p1.update(sdt, this.p2, this); this.p2.update(sdt, this.p1, this);
      if (this.bannerT <= 0) { this.state = "fight"; this.banner = "FIGHT!"; this.bannerT = 0.8; }
    } else if (this.state === "fight") {
      this.bannerT -= dt;
      this.timer -= dt;
      if (this.online) {
        // オンライン：ロックステップで配られた入力を両者へ適用
        this.applyInputs(this._oi1, this._oi2);
      } else {
        // 1P 入力
        this.p1.walk(Input.moveDir1(), this.p2);
        for (const ev of Input.takeEvents1()) this.p1.request(ev.kind, ev.g);
        // 2P 入力（ローカル対戦） / CPU（CPU戦）
        if (this.mode === "vs") {
          this.p2.walk(Input.moveDir2(), this.p1);
          for (const ev of Input.takeEvents2()) this.p2.request(ev.kind, ev.g);
        } else {
          this.updateAI(sdt);
        }
      }

      this.p1.update(sdt, this.p2, this);
      this.p2.update(sdt, this.p1, this);
      for (const pr of this.projectiles) pr.update(sdt);
      this.projectiles = this.projectiles.filter(p => !p.dead);
      this.checkCombat();

      if (this.timer <= 0) {
        // タイムアップ：HP多い方の勝ち
        this.timer = 0;
        const w = this.p1.hp === this.p2.hp ? -1 : (this.p1.hp > this.p2.hp ? 0 : 1);
        if (w === -1) { this.wins[0]++; this.wins[1]++; }
        else this.wins[w]++;
        this.state = "roundEnd";
        this.banner = w === -1 ? "DRAW" : ((w === 0 ? this.p1.name : this.p2.name) + " の勝ち！");
        this.bannerT = 2.6;
      }
    } else if (this.state === "roundEnd") {
      this.bannerT -= dt;
      if (this.koTarget) this.koTarget.koTimer += dt;
      this.p1.update(sdt, this.p2, this); this.p2.update(sdt, this.p1, this);
      for (const pr of this.projectiles) pr.update(sdt);
      this.projectiles = this.projectiles.filter(p => !p.dead);
      if (this.bannerT <= 0) {
        if (this.wins[0] >= 2 || this.wins[1] >= 2) {
          this.state = "matchEnd";
          if (this.online) {
            const youWon = (this.netRole === "host") === (this.wins[0] >= 2);
            this.banner = youWon ? "YOU WIN!" : "YOU LOSE";
            onMatchEndOnline(this.netRole === "host");   // DOM の もう一度/退出 を表示
          } else if (this.mode === "cpu") this.banner = this.wins[0] >= 2 ? "YOU WIN!" : "YOU LOSE";
          else this.banner = (this.wins[0] >= 2 ? this.p1.name : this.p2.name) + " WINS!";
          this.bannerT = 999;
          Audio_.round();
        } else { this.round++; this.startRound(); }
      }
    }

    this.fx.update(sdt);
    if (this.shake > 0) this.shake -= dt * 60;
  }

  /* ---- HUD ---- */
  drawBar(ctx, x, y, w, h, ratio, color, right) {
    ctx.fillStyle = "rgba(0,0,0,.55)"; ctx.fillRect(x - 3, y - 3, w + 6, h + 6);
    ctx.fillStyle = "#2a2030"; ctx.fillRect(x, y, w, h);
    const bw = w * Math.max(0, Math.min(1, ratio));
    const g = ctx.createLinearGradient(x, y, x, y + h);
    g.addColorStop(0, shade(color, .25)); g.addColorStop(1, color);
    ctx.fillStyle = g;
    if (right) ctx.fillRect(x + w - bw, y, bw, h); else ctx.fillRect(x, y, bw, h);
    ctx.strokeStyle = "rgba(255,255,255,.35)"; ctx.lineWidth = 1; ctx.strokeRect(x, y, w, h);
  }
  drawHUD(ctx) {
    const bw = 480, bh = 26, my = 30;
    this.drawBar(ctx, 40, my, bw, bh, this.p1.hp / 100, "#39d353", false);
    this.drawBar(ctx, W - 40 - bw, my, bw, bh, this.p2.hp / 100, "#ff4d4d", true);
    // メーター
    this.drawBar(ctx, 40, my + bh + 8, bw * 0.7, 10, this.p1.meter / MAX_METER, "#ffd23d", false);
    this.drawBar(ctx, W - 40 - bw * 0.7, my + bh + 8, bw * 0.7, 10, this.p2.meter / MAX_METER, "#ffd23d", true);
    // 名前
    ctx.fillStyle = "#fff"; ctx.font = "bold 20px system-ui"; ctx.textBaseline = "alphabetic";
    ctx.textAlign = "left"; ctx.fillText(this.p1.name, 42, my - 8);
    ctx.textAlign = "right"; ctx.fillText(this.p2.name, W - 42, my - 8);
    // タイマー
    ctx.textAlign = "center"; ctx.font = "bold 40px system-ui";
    ctx.fillStyle = this.timer < 11 ? "#ff6b6b" : "#fff";
    ctx.fillText(Math.ceil(this.timer), W / 2, my + 38);
    // ラウンドランプ
    for (let i = 0; i < 2; i++) {
      ctx.fillStyle = this.wins[0] > i ? "#ffd23d" : "rgba(255,255,255,.2)";
      ctx.beginPath(); ctx.arc(W / 2 - 22 - i * 18, my + 4, 6, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = this.wins[1] > i ? "#ffd23d" : "rgba(255,255,255,.2)";
      ctx.beginPath(); ctx.arc(W / 2 + 22 + i * 18, my + 4, 6, 0, Math.PI * 2); ctx.fill();
    }
  }
  drawBanner(ctx) {
    if (this.bannerT <= 0 && this.state !== "matchEnd") return;
    if (!this.banner) return;
    ctx.save(); ctx.textAlign = "center"; ctx.textBaseline = "middle";
    const big = this.state === "matchEnd";
    const sz = big ? 90 : 64;
    ctx.font = `900 ${sz}px system-ui`;
    const pulse = 1 + Math.sin(this.t * 6) * 0.04;
    ctx.translate(W / 2, big ? H / 2 - 40 : H * 0.32); ctx.scale(pulse, pulse);
    ctx.lineWidth = 8; ctx.strokeStyle = "#10081a"; ctx.strokeText(this.banner, 0, 0);
    const g = ctx.createLinearGradient(0, -sz / 2, 0, sz / 2);
    g.addColorStop(0, "#fff7c2"); g.addColorStop(1, "#ffb33d");
    ctx.fillStyle = g; ctx.fillText(this.banner, 0, 0);
    ctx.restore();
  }
  drawTitle(ctx) {
    ctx.save(); ctx.textAlign = "center";
    ctx.font = "900 110px system-ui";
    ctx.lineWidth = 10; ctx.strokeStyle = "#10081a";
    ctx.strokeText("NEON FIST", W / 2, H * 0.30);
    const g = ctx.createLinearGradient(0, H * 0.30 - 60, 0, H * 0.30 + 30);
    g.addColorStop(0, "#9fe8ff"); g.addColorStop(0.5, "#5aa6ff"); g.addColorStop(1, "#ff5bd0");
    ctx.fillStyle = g; ctx.fillText("NEON FIST", W / 2, H * 0.30);

    // モード選択メニュー
    const opts = [
      { t: "1  CPU と対戦", y: H * 0.50 },
      { t: "2  オンライン対戦", y: H * 0.59 },
    ];
    ctx.font = "bold 34px system-ui";
    for (let i = 0; i < opts.length; i++) {
      const sel = this.menuIndex === i;
      ctx.fillStyle = sel ? "#ffd23d" : "rgba(255,255,255,.55)";
      const label = (sel ? "▶  " : "    ") + opts[i].t;
      ctx.fillText(label, W / 2, opts[i].y);
    }
    // 操作説明
    ctx.font = "bold 17px system-ui"; ctx.fillStyle = "#9fb4e0";
    ctx.fillText("↑↓で選択 ・ Enter / 数字キー で決定", W / 2, H * 0.72);
    ctx.font = "14px system-ui"; ctx.fillStyle = "#7e87b5";
    ctx.fillText("CPU戦  ←→ 移動 / 文字キー 攻撃", W / 2, H * 0.80);
    ctx.fillText("オンライン  移動: ←→ または A D   攻撃: F / Space", W / 2, H * 0.84);
    ctx.restore();
  }

  draw(ctx) {
    let ox = 0, oy = 0;
    if (this.shake > 0) { ox = (Math.random() - 0.5) * this.shake; oy = (Math.random() - 0.5) * this.shake; }
    ctx.save();
    ctx.clearRect(0, 0, W, H);

    // --- ワールド層（カメラ揺れ＋シネマズーム） ---
    ctx.save();
    ctx.translate(ox, oy);
    if (this.cine > 0) {
      const z = 1 + (this.cine / Math.max(0.001, this.cineMax)) * this.cineAmt;
      const fc = this.zoomFocus;
      ctx.translate(fc.x, fc.y); ctx.scale(z, z); ctx.translate(-fc.x, -fc.y);
    }
    const camX = (this.p1.x + this.p2.x) / 2 - W / 2;
    Stage.draw(ctx, this.t, camX);

    if (this.state === "title") { this.drawTitle(ctx); ctx.restore(); ctx.restore(); return; }

    // ファイター
    this.p2.draw(ctx); this.p1.draw(ctx);
    for (const pr of this.projectiles) pr.draw(ctx);
    this.fx.draw(ctx);
    ctx.restore();   // --- ワールド層おわり（フラッシュ/HUDはズームしない） ---

    // 画面フラッシュ（必殺技ヒットの「バーン」）— 全面
    if (this.flash > 0) {
      const a = Math.min(1, this.flash / Math.max(0.001, this.flashMax));
      ctx.save();
      ctx.globalAlpha = a * 0.9;
      const fg = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, W * 0.7);
      fg.addColorStop(0, "#ffffff");
      fg.addColorStop(0.5, this.flashColor || "#ffffff");
      fg.addColorStop(1, this.flashColor || "#ffffff");
      ctx.fillStyle = fg; ctx.fillRect(-40, -40, W + 80, H + 80);
      ctx.restore();
    }

    this.drawHUD(ctx);
    this.drawBanner(ctx);
    if (this.state === "matchEnd" && !this.online) {
      ctx.save(); ctx.textAlign = "center"; ctx.font = "bold 24px system-ui"; ctx.fillStyle = "#fff";
      if (Math.sin(this.t * 4) > -0.3) ctx.fillText("Press ENTER", W / 2, H / 2 + 70);
      ctx.restore();
    }
    ctx.restore();
  }
}

/* =====================================================================
   NETPLAY — WebRTC(P2P) 決定論ロックステップ（入力遅延方式）
     両端末が同一シミュレーションを並走し、各フレームの入力だけを交換する。
     入力遅延 D フレーム分の猶予で相手入力の到着を待つ（届かなければ一時停止）。
   ===================================================================== */
const Net = (() => {
  const NS = "neonfist-v1-";          // PeerID 名前空間（公開ブローカでの衝突回避）
  const D = 3;                        // 入力遅延（フレーム）。大きいほど安定/反応は鈍る
  const MAX_CATCHUP = 8;              // 1描画フレームで進める最大シムフレーム数
  const CONNECT_TIMEOUT = 15;         // 接続確立の待ち上限（秒）
  // NAT越えのためのICEサーバ：STUN（経路探索）＋ TURN（中継。厳しいNAT時の最後の砦）
  const PEER_OPTS = {
    debug: 1,
    config: {
      iceServers: [
        { urls: "stun:stun.l.google.com:19302" },
        { urls: "stun:stun1.l.google.com:19302" },
        { urls: "stun:global.stun.twilio.com:3478" },
        // OpenRelay の無料TURN（ベストエフォート。確実性が必要なら専用TURNを推奨）
        { urls: "turn:openrelay.metered.ca:80", username: "openrelayproject", credential: "openrelayproject" },
        { urls: "turn:openrelay.metered.ca:443", username: "openrelayproject", credential: "openrelayproject" },
        { urls: "turn:openrelay.metered.ca:443?transport=tcp", username: "openrelayproject", credential: "openrelayproject" },
      ],
    },
  };
  let peer = null, conn = null, role = null;
  let connected = false, started = false;
  let sendFrame = 0, simFrame = 0;
  let connectTimer = null;
  const localIn = new Map(), remoteIn = new Map();
  let cb = { onStatus() {}, onStart() {}, onClose() {} };

  function init(callbacks) { cb = Object.assign(cb, callbacks); }
  function errMsg(e) {
    switch (e && e.type) {
      case "peer-unavailable": return "その部屋コードのホストが見つかりません（ホストが先に部屋を作ったか／コードを確認）";
      case "unavailable-id":   return "そのコードは使用中です。もう一度お試しください";
      case "network":          return "シグナリングサーバに接続できません（回線を確認して再試行）";
      case "server-error":     return "サーバ混雑の可能性。少し待って再試行してください";
      case "browser-incompatible": return "このブラウザはWebRTC非対応です";
      default: return "接続エラー: " + (e && e.type ? e.type : "unknown");
    }
  }
  function armTimeout() {
    clearTimeout(connectTimer);
    connectTimer = setTimeout(() => {
      if (!connected) { cb.onStatus({ text: "接続できませんでした。ネットワーク/コードを確認して、もう一度お試しください", failed: true }); cleanup(); }
    }, CONNECT_TIMEOUT * 1000);
  }
  function genCode() {
    const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    let s = ""; for (let i = 0; i < 4; i++) s += chars[Math.floor(Math.random() * chars.length)];
    return s;
  }
  // 入力エンコード：move(-1,0,1)→0..2、attackビット
  function enc(inp) { return (inp.move + 1) | (inp.attack ? 4 : 0); }
  function dec(v) { return { move: (v & 3) - 1, attack: (v & 4) !== 0 }; }
  const NEUTRAL = enc({ move: 0, attack: false });

  function host() {
    cleanup();
    role = "host";
    const code = genCode();
    peer = new Peer(NS + code, PEER_OPTS);
    peer.on("open", () => cb.onStatus({ text: "部屋コードを相手に伝えてください", code, waiting: true }));
    peer.on("connection", (c) => { conn = c; armTimeout(); bindConn(); });
    peer.on("error", (e) => { cb.onStatus({ text: errMsg(e), failed: true }); cleanup(); });
    return code;
  }
  function join(code) {
    cleanup();
    role = "guest";
    code = (code || "").trim().toUpperCase();
    if (code.length < 4) { cb.onStatus({ text: "4文字の部屋コードを入力してください" }); return; }
    peer = new Peer(NS + "g-" + genCode(), PEER_OPTS);
    peer.on("open", () => {
      cb.onStatus({ text: "接続中…（最大" + CONNECT_TIMEOUT + "秒）" });
      conn = peer.connect(NS + code, { reliable: true });
      armTimeout();
      bindConn();
    });
    peer.on("error", (e) => { cb.onStatus({ text: errMsg(e), failed: true }); cleanup(); });
  }
  function bindConn() {
    conn.on("open", () => {
      clearTimeout(connectTimer);
      connected = true;
      cb.onStatus({ text: role === "host" ? "接続完了！『対戦開始』を押してください" : "接続完了！ホストの開始を待っています…",
                    connected: true, canStart: role === "host" });
    });
    conn.on("data", onData);
    conn.on("close", () => { if (started || connected) cb.onClose("相手が切断しました"); reset(); });
    conn.on("error", (e) => { cb.onClose(errMsg(e)); reset(); });
  }
  function onData(msg) {
    if (!msg) return;
    if (msg.t === "start") { if (!started) _start(); }
    else if (msg.t === "in") { remoteIn.set(msg.f, msg.i); }
  }
  function send(o) { if (conn && conn.open) conn.send(o); }

  // ホストが開始（または再戦）。相手にも start を送り、両者で同一フレーム0から
  function begin() { if (role === "host" && connected) { send({ t: "start" }); _start(); } }
  function _start() {
    started = true; sendFrame = 0; simFrame = 0; localIn.clear(); remoteIn.clear();
    for (let f = 0; f < D; f++) { localIn.set(f, NEUTRAL); send({ t: "in", f, i: NEUTRAL }); }
    sendFrame = D;
    cb.onStart(role);
  }

  // 毎描画フレーム：steps 個の入力を採取・送信し、両入力が揃ったフレームを進める
  function tick(steps) {
    if (!started) return;
    for (let s = 0; s < steps; s++) {
      const i = enc(Input.sampleLocal());
      localIn.set(sendFrame, i); send({ t: "in", f: sendFrame, i }); sendFrame++;
    }
    let n = 0;
    while (n < MAX_CATCHUP && localIn.has(simFrame) && remoteIn.has(simFrame)) {
      const li = dec(localIn.get(simFrame)), ri = dec(remoteIn.get(simFrame));
      const in1 = role === "host" ? li : ri;   // P1=ホスト側
      const in2 = role === "host" ? ri : li;   // P2=ゲスト側
      game.setOnlineInputs(in1, in2);
      game.update(STEP);
      localIn.delete(simFrame); remoteIn.delete(simFrame);
      simFrame++; n++;
    }
  }

  function leave() { send({ t: "bye" }); reset(); }
  function reset() { started = false; connected = false; clearTimeout(connectTimer); localIn.clear(); remoteIn.clear(); }
  function cleanup() { reset(); if (conn) { try { conn.close(); } catch (e) {} conn = null; }
    if (peer) { try { peer.destroy(); } catch (e) {} peer = null; } }

  return { init, host, join, begin, tick, leave, cleanup,
           isStarted: () => started, isConnected: () => connected, getRole: () => role };
})();

/* =====================================================================
   MAIN LOOP（固定タイムステップ）
   ===================================================================== */
const game = new Game();
let last = performance.now(), acc = 0;
const STEP = 1 / 60;
function frame(now) {
  let dt = (now - last) / 1000; last = now;
  if (dt > 0.25) dt = 0.25;
  acc += dt;
  let steps = 0;
  while (acc >= STEP) { steps++; acc -= STEP; }
  if (game.online) {
    // オンライン：シム進行は Net（ロックステップ）が駆動。未開始時は背景だけ進める
    if (Net.isStarted()) Net.tick(steps);
    else game.t += steps * STEP;
  } else {
    for (let i = 0; i < steps; i++) game.update(STEP);
  }
  game.draw(ctx);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* =====================================================================
   LOBBY UI — オンライン対戦のDOM配線
   ===================================================================== */
const $ = (id) => document.getElementById(id);
const lobbyEl = $("lobby"), lobbyHome = $("lobbyHome"), lobbyStatus = $("lobbyStatus");
const statusText = $("statusText"), roomCodeEl = $("roomCode"), btnStart = $("btnStart");
const rematchEl = $("rematch"), btnRematch = $("btnRematch"), rematchText = $("rematchText");

Net.init({
  onStatus(s) {
    showStatusView();
    statusText.textContent = s.text || "";
    if (s.code) { roomCodeEl.textContent = s.code; roomCodeEl.classList.remove("hidden"); }
    if (s.failed) roomCodeEl.classList.add("hidden");   // 失敗時は古いコードを隠す
    btnStart.classList.toggle("hidden", !s.canStart);
  },
  onStart() { hide(lobbyEl); hide(rematchEl); game.startOnline(Net.getRole()); },
  onClose(msg) {
    hide(rematchEl);
    if (game.online) game.endOnline();
    // タイトルへ戻し、理由を表示
    openLobby(); showStatusView();
    statusText.textContent = msg || "切断しました";
    roomCodeEl.classList.add("hidden"); btnStart.classList.add("hidden");
  },
});

function show(el) { el.classList.remove("hidden"); }
function hide(el) { el.classList.add("hidden"); }
function showHomeView() { show(lobbyHome); hide(lobbyStatus); }
function showStatusView() { hide(lobbyHome); show(lobbyStatus); }

// タイトルの「オンライン対戦」から呼ばれる（関数宣言＝巻き上げで game から参照可）
function openLobby() { game.online = true; show(lobbyEl); showHomeView();
  roomCodeEl.classList.add("hidden"); btnStart.classList.add("hidden"); statusText.textContent = ""; }
function closeLobbyToTitle() { Net.cleanup(); hide(lobbyEl); game.online = false; game.state = "title"; }

// 試合終了（オンライン）：もう一度/退出 オーバーレイ
function onMatchEndOnline(isHost) {
  show(rematchEl);
  rematchText.textContent = game.banner;     // YOU WIN! / YOU LOSE
  btnRematch.classList.toggle("hidden", !isHost);  // 再戦の開始はホストのみ
}

$("btnHost").onclick = () => { Net.host(); };
$("btnJoin").onclick = () => { Net.join($("codeInput").value); };
$("codeInput").addEventListener("keydown", (e) => { if (e.key === "Enter") Net.join($("codeInput").value); });
$("btnBack").onclick = closeLobbyToTitle;
$("btnCancel").onclick = closeLobbyToTitle;
btnStart.onclick = () => { Net.begin(); };      // ホスト：対戦開始
btnRematch.onclick = () => { hide(rematchEl); Net.begin(); };   // ホスト：再戦
$("btnExit").onclick = () => { hide(rematchEl); Net.leave(); game.endOnline(); };
</script>
</body>
